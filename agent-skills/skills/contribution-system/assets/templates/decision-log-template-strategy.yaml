# Decision Log Template — Strategy/Planning contributions
# Use this template for decision-log.yaml created by dev-strategy skill.
#
# Schema: Unified across strategy and implementation (matches diffviz-review Decision struct).
# For strategy-level decisions: code_impacts will be EMPTY (decisions made before coding).
# For implementation-level decisions: code_impacts will be POPULATED (decisions + code changes).

base_commit: null  # Strategy decisions: usually null. Implementation: git hash before changes.

decisions:
  - number: 1
    title: "[Decision made in one sentence]"
    rationale: "[Why this choice was made]"  # optional
    code_impacts: []  # Empty for strategy (no code yet); will be populated during implementation

  - number: 2
    title: "[Another decision]"
    rationale: "[Why this choice was made]"
    code_impacts: []

  # Common strategy decisions to document:
  # - Selected implementation strategy (TDD / Steel Thread / Core-then-Integrate)
  # - Technology choices
  # - Architectural constraints accepted
  # - Design decisions deferred to later phases
  #
  # Example:
  # - number: 1
  #   title: "Use Core-then-Integrate strategy"
  #   rationale: "Allows incremental testing and verification; each phase independent"
  #   code_impacts: []
  #
  # - number: 2
  #   title: "Store decisions in diffviz-review crate"
  #   rationale: "Domain decisions belong in orchestration layer, not CLI"
  #   code_impacts: []
