# Decision Log Template — Implementation/Contribution contributions
# Use this template for decision-log.yaml in implementation, review, audit, revision, foundation, expansion, etc.
# base_commit: populated by dev-contribute Step 3.1 (git rev-parse HEAD before any changes)
base_commit: ""

decisions:
  - number: 1
    title: "[Decision made in one sentence]"
    rationale: "[Why this choice was made — constraints, user priorities, trade-offs]"  # optional
    code_impacts:
      - file: "[path/to/file.rs]"
        reasoning: "[Why this file is affected by this decision]"
        line_ranges:
          - start: 1
            end: 50

