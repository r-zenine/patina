# Technical Decisions - Phase X [Planning Type]
#
# Purpose: Record technical and architectural choices for the dev-strategy
#
# This template captures planning decisions made during strategy development.

# REQUIRED: Contribution metadata
contribution:
  number: <phase-number>
  phase: "<phase-name>"
  type: "<design|planning|architecture>"

# REQUIRED: List of decisions
# Minimal structure: id, title, choice
# Optional: rationale (alternatives, constraints, implications)
decisions:
  - id: "D1"
    title: "<decision-topic>"
    # What was chosen?
    choice: "<what-was-chosen>"
    # Why this choice? What alternatives were considered?
    rationale: |
      <explanation of why, alternatives considered, trade-offs>

  - id: "D2"
    title: "<another-decision>"
    choice: "<choice>"
    rationale: |
      <explanation>

# OPTIONAL: Context about strategy development
context: |
  <strategy rationale, key constraints, assumptions>

# --- EXAMPLES ---

# MINIMAL STYLE (Essential info only):
# contribution:
#   number: 1
#   phase: "Initial Strategy"
#   type: "planning"
# decisions:
#   - id: "D1"
#     title: "Phasing approach"
#     choice: "Core-then-Integrate strategy (Phases 1-3 code, Phase 4 templates)"
#   - id: "D2"
#     title: "Test update timing"
#     choice: "Tests updated last (Phase 3) to validate all prior changes"

# VERBOSE STYLE (Detailed reasoning):
# contribution:
#   number: 1
#   phase: "Decision Simplification Strategy"
#   type: "planning"
# decisions:
#   - id: "D1"
#     title: "Implementation phasing strategy"
#     choice: "Core-then-Integrate: Update entities first, then TUI, then tests"
#     rationale: |
#       This approach follows the principle "Technical And Functional never change together".
#       Phase 1: Update core Decision/CodeImpact entities (structure only, no behavior change)
#       Phase 2: Update TUI to render the new structure
#       Phase 3: Update all test fixtures
#       Alternative: Monolithic change all at once
#       Trade-off: Three phases take longer but ensure compilability at each step
#
#   - id: "D2"
#     title: "When to update tests"
#     choice: "Tests updated last (Phase 3), after entities and TUI"
#     rationale: |
#       Tests should validate the changes, not be updated in parallel.
#       By Phase 3: core logic works, TUI renders correctly, only tests need updates.
#       This minimizes test failures during development.
#       Alternative: Update tests immediately with entities (Phase 1)
#       Trade-off: Phase 1-2 would have test failures, but cleaner to debug in isolation
#
#   - id: "D3"
#     title: "Scope of Phase 4"
#     choice: "Create YAML templates for agent-skills (separate from code changes)"
#     rationale: |
#       Phase 4 is not code changes, but documentation templates.
#       These enable agents to use structured YAML for decision-logs.
#       Not in scope: changing how diffviz-review uses decisions at runtime.
#       Future possibility: agent-skills could generate diffviz-review YAML files
#
# context: |
#   This strategy addresses two parallel needs:
#   - Track A (Phases 1-3): Simplify Decision/CodeImpact entities in diffviz-review
#   - Track B (Phase 4): Create YAML templates for agent-skills contributions
#   Both tracks use "decision logs" but serve different purposes.
#   Independent implementation with potential future integration.
