# Decision Log Template — Implementation/Contribution contributions
# Use this template for decision-log.yaml in implementation, review, audit, revision, etc.
#
# Schema: Unified across strategy and implementation (matches diffviz-review Decision struct).
# For implementation-level decisions: code_impacts MUST be populated with actual code changes.
# For code review/audit: code_impacts maps to existing code being reviewed.

base_commit: "git-hash-here"  # Populated by dev-contribute Step 3.1: git rev-parse HEAD (before any changes)

decisions:
  - number: 1
    title: "[Decision made in one sentence]"
    rationale: "[Why this choice was made — constraints, user priorities, trade-offs]"  # optional
    code_impacts:  # Empty for strategy (no code yet); will be populated during implementation
      - file: "[path/to/file.rs]"
        reasoning: "[Why this file is affected by this decision]"
        line_ranges:
          - start: 10
            end: 50

  - number: 2
    title: "[Next decision]"
    rationale: "[Rationale]"
    code_impacts:
      - file: "[path/to/another/file.rs]"
        reasoning: "[Why affected]"
        line_ranges:
          - start: 100
            end: 150

  # Decision with no code impacts (deferred or planning-level decision):
  # - number: 3
  #   title: "Design deferred to Phase 5"
  #   rationale: "Not needed until integration phase"
  #   code_impacts: []
