# Technical Decisions - Phase X [Contribution Type]
#
# Purpose: Record technical choices for future agents to understand context and constraints
#
# This template captures decisions made during a contribution.
# Agents can use minimal or verbose style depending on decision complexity.

# REQUIRED: Contribution metadata
contribution:
  number: <phase-number>
  phase: "<phase-name>"
  type: "<implementation|design|refactor|testing|documentation>"

# REQUIRED: List of decisions
# Minimal structure: id, title, choice
# Optional: rationale (alternatives, trade-offs, constraints)
decisions:
  - id: "D1"
    title: "<decision-topic>"
    # What was chosen?
    choice: "<what-was-chosen>"
    # Why this choice? What alternatives were considered?
    rationale: |
      <explanation of why, alternatives considered, trade-offs>

  - id: "D2"
    title: "<another-decision>"
    choice: "<choice>"
    rationale: |
      <explanation>

# OPTIONAL: High-level context about how decisions were made
context: |
  <how decisions were made, constraints that limited choices, key learnings>

# --- EXAMPLES ---

# MINIMAL STYLE (Essential info only):
# contribution:
#   number: 2
#   phase: "Phase 2"
#   type: "implementation"
# decisions:
#   - id: "D1"
#     title: "Choose Jest for testing"
#     choice: "Used Jest + custom matchers"
#   - id: "D2"
#     title: "Factory pattern for test data"
#     choice: "UserFactory.create() for all test users"

# VERBOSE STYLE (Detailed reasoning):
# contribution:
#   number: 2
#   phase: "Phase 2"
#   type: "implementation"
# decisions:
#   - id: "D1"
#     title: "Choose test framework"
#     choice: "Jest + custom matchers"
#     rationale: |
#       Chose Jest for consistency with existing codebase.
#       Custom matchers (toBeAuthenticated) reduce boilerplate.
#       Alternatives considered:
#       - Mocha: More flexibility but less familiar to team
#       - Vitest: Good but overkill for our test scope
#       Trade-off: Jest is less flexible but more maintainable long-term
#
#   - id: "D2"
#     title: "Test data construction approach"
#     choice: "Factory functions (UserFactory.create())"
#     rationale: |
#       Factories decouple tests from implementation details.
#       Alternative: Fixtures with shared test data
#       Trade-off: Factories add slight overhead but prevent test coupling

# REVISION STYLE (Changing previous decisions):
# contribution:
#   number: 3
#   phase: "Phase 1 Revision"
#   type: "refactor"
# decisions:
#   - id: "D1"
#     title: "Revision of Contribution 002 - API design"
#     choice: "Switched from REST to GraphQL"
#     rationale: |
#       Original REST design led to over-fetching and multiple endpoints.
#       GraphQL solves both: single endpoint, exact field selection.
#       Key insight: Only 3 REST endpoints but 15+ required queries.
#       Trade-off: Must migrate gradually, maintain backwards compatibility
# context: |
#   This is a revision of Contribution 002's REST approach.
#   Reviewed after seeing usage patterns in production.
#   Constraints: 3 existing endpoints, gradual migration needed.
