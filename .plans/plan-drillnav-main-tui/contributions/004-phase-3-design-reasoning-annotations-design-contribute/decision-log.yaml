commit: null

decisions:
  - number: 1
    title: Reasoning annotation lines use the mauve accent, no sigil, at CardTier::Content
    rationale: >
      D5 (drillnav-main-tui) already fixed tier and general treatment (accent
      fg, no sigil); lavender/green/red/yellow are already claimed by
      focus/approval/deletion/notes in the drill card, so the color had to
      come from the unclaimed set. User picked mauve over sky (viable
      runner-up) and peach (rejected — reads as a warning next to red
      deletions) for being closer to the old diff_view's "dim" annotation
      feel while staying visually distinct from every other accent in the card.
    code_impacts: []

  - number: 2
    title: Drop the old cross-decision '◆' badge entirely rather than port or relocate it
    rationale: >
      The old diff_view title-bar badge signaled "this chunk is also
      referenced by other decisions" when annotations were collapsed — a
      Browse-mode concern (which decision to review) that doesn't fit
      Drill mode, where the user has already committed to one decision.
      User chose to drop it (recommended) over keeping it in the chunk
      header next to the ✓ badge, or aggregating it once per file header —
      both alternatives would add a feature the DrillNav roadmap never
      asked for. No information is lost: cross-decision membership is still
      visible per-annotation-line (each carries its own D{n} label) whenever
      show_reasoning is on.
    code_impacts: []

  - number: 3
    title: Reuse the existing trigger-line algorithm unchanged
    rationale: >
      trigger_line = max(code_impact_range.start, diff_start_line), ported
      verbatim from plan-inline-reasoning-annotations D3. Nothing about
      DrillNav changes chunk/diff structure, so there is no new constraint
      to design against; refining precision is explicitly out of scope
      unless imprecision is observed in practice.
    code_impacts: []
