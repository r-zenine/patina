commit: "b2214606bda66fba09aaef60af6fea639630cb94"
decisions:
  - number: 1
    title: DrillNav stub accessors are real, mutators are inert no-ops
    rationale: >
      Phase 0 requires the test suite to compile and fail behaviorally, not
      on missing symbols. Accessors (nav_mode, browse_cursor, drill_position,
      drill_context_expanded, drill_note_expanded, drill_page_offset,
      status_message) genuinely read the DrillNavState machine so StateSnapshot
      v2 reports truthful state; mutators (navigate_*, drill_in, back,
      toggle_context, toggle_note_expansion, drill_page_up/down, to_top,
      to_bottom, set/clear_status_message) are empty bodies until Phase 1.
      drill_nav and status_message are private UiState fields (V4
      encapsulation) unlike the legacy pub fields — the prototype's public-field
      style is deliberately not ported.
    code_impacts:
      - reasoning: >
          [Structural - Public API] New pub types DrillNavState/FileView and
          14 pub UiState methods define the Phase 1 implementation surface;
          Phase 1 must fill these exact signatures, not invent new ones.
        file: diffviz-review-tui/src/state.rs
        line_ranges:
          - start: 27
            end: 66
          - start: 479
            end: 583

  - number: 2
    title: Drill paging methods named drill_page_up/drill_page_down, not page_up/page_down
    rationale: >
      The roadmap names them page_up/down, but UiState already has
      page_up/page_down carrying old scroll_offset semantics that surviving
      tests still exercise. Phase 0 must not change behavior, so the DrillNav
      variants take the drill_ prefix; Phase 4 deletes the old pair and may
      reclaim the names.
    code_impacts: []

  - number: 3
    title: FileView carries page_offset from Phase 0 so Ctrl-d/u is state-assertable
    rationale: >
      D3 mandates viewport paging per drilled file. Without a page_offset in
      the snapshot the Ctrl-d/u contract could only be asserted visually
      (Phase 2), leaving a key-table hole in the Phase 0 suite. The offset is
      per-FileView so h/l retains reading position, matching the retention
      model of cursor/expanded flags.
    code_impacts:
      - reasoning: >
          [Structural - Core entity shape] StateSnapshot gains 9 additive v2
          fields (nav_mode, browse_cursor, drill_*, status_message); old
          fields are kept so pre-existing tests compile — Phase 1 starts
          dropping ones no surviving test reads.
        file: diffviz-review-tui/src/state_snapshot.rs
        line_ranges:
          - start: 63
            end: 91
          - start: 129
            end: 137

  - number: 4
    title: Approving an empty review is the forced error path for D7 status_message tests
    rationale: >
      Engine approve/reject/add_instruction never return Err today, so no key
      sequence over real fixtures can produce an engine failure. Pressing 'a'
      in Browse over a review with zero decisions is the one reachable failure
      (no target resolvable); the contract test builds an empty-decision
      engine and asserts status_message is set and cleared on the next key.
      Phase 1 must treat an unresolvable approve target as an error surfaced
      via set_status_message, not a silent no-op.
    code_impacts:
      - reasoning: >
          [Behavioral - Error path change] Encodes D7: business-event failures
          must land in UiState::status_message instead of propagating up and
          aborting the app; test_failed_approval_surfaces_status_message_and_
          next_key_clears_it is the binding contract.
        file: diffviz-review-tui/tests/drillnav_approval_tests.rs
        line_ranges:
          - start: 100
            end: 125

  - number: 5
    title: Engine-state assertions drive ReviewTuiApp directly instead of extending the harness
    rationale: >
      InputTestHarness consumes the app, so approval/note effects can't be
      read back through it. Rather than widening the harness API,
      drillnav_common::drive_app feeds parsed keys through the public
      ReviewTuiApp::process_key_event and reclaims the engine via
      into_review_engine — zero new surface on frozen public APIs. Note tests
      target calculator.rs (file idx 1) because reader.rs has two chunks with
      identical start lines, making chunk-cursor order ambiguous.
    code_impacts: []

  - number: 6
    title: Test fixtures duplicate the main.rs hardcoded decisions; no fixture extension needed
    rationale: >
      Phase 0 audit (temporary structure-dump test, deleted) confirmed the
      existing decisions already exercise everything the contract needs:
      decision 1 spans 2 files (2 and 7 chunks), decision 3 spans 3 files,
      decision 2 is the single-file/single-chunk edge case. The shared
      tests/drillnav_common/mod.rs module documents the audited
      decision→file→chunk map so tests can assert exact indices.
    code_impacts: []
