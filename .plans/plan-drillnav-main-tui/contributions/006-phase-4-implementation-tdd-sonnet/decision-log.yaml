commit: "7a76a6f"
decisions:
  - number: 1
    title: show_all_context/ToggleContextDisplay (Space t c) deleted alongside the explicit roadmap list
    rationale: >
      The Phase 4 roadmap's explicit dead-field list named highlight_semantics
      but not show_all_context. Investigation showed show_all_context was
      read only by diff_view.rs (this phase's deletion target), so leaving
      it would advertise a live leader key (Space t c) that does nothing
      once diff_view.rs is gone. Asked the user directly; they confirmed
      deleting it rather than leaving inert dead state out of scope.
    code_impacts:
      - reasoning: >
          UiState.show_all_context field, toggle_context_display() method,
          and the ToggleContextDisplay UiEvent/key binding (Space t c)
          removed together.
        file: diffviz-review-tui/src/state.rs
        line_ranges:
          - start: 1
            end: 50

  - number: 2
    title: Leader Instructions submenu (Space i) collapsed entirely, not just its one entry
    rationale: >
      Deleting show_instructions/ToggleInstructions (Space i t) per the
      roadmap's explicit field list left the Instructions submenu with zero
      remaining entries. Rather than keep a submenu entry point to an empty
      menu, the 'i' root-menu item and the whole submenu match arm were
      removed. DrillNav's inline note rows (visible on the chunk card
      whenever a note exists) already cover the surface the old "toggle
      instructions overlay" served.
    code_impacts:
      - reasoning: >
          Removed (None, 'i') => EnterLeaderSubmenu('i') and the
          (Some('i'), 't') arm from handle_leader_keys; removed the 'i'
          match arms and create_instructions_submenu() from which_key.rs.
        file: diffviz-review-tui/src/events/input.rs
        line_ranges:
          - start: 233
            end: 253
      - reasoning: >
          which_key.rs's root menu, submenu dispatch, and title match all
          drop the 'i' case; create_instructions_submenu() deleted.
        file: diffviz-review-tui/src/ui/components/which_key.rs
        line_ranges:
          - start: 1
            end: 120

  - number: 3
    title: The entire formatting module deleted as pre-existing orphaned code, not just diff_view's dependents
    rationale: >
      Grep found formatting::{TuiDiffFormatter, FormattedDiff} referenced by
      nothing outside formatting/diff_formatter.rs itself — not even by
      diff_view.rs, which had its own separate rendering path. This dead
      code predated the DrillNav migration entirely. Not named in the
      roadmap's deletion list, but it is exactly the kind of dead weight
      Phase 4 exists to remove, so it was swept up rather than left as an
      orphan with no remaining purpose.
    code_impacts:
      - reasoning: >
          Deleted formatting/mod.rs and formatting/diff_formatter.rs; removed
          `pub mod formatting;` from lib.rs.
        file: diffviz-review-tui/src/lib.rs
        line_ranges:
          - start: 1
            end: 20

  - number: 4
    title: Two leader-key tests deleted, one simplified, rather than patched to keep passing
    rationale: >
      test_leader_submenu_instructions asserted Space-i enters an 'i'
      submenu that no longer exists (hard failure, caught by the test
      suite). test_leader_visual_instructions_menu asserted on a loose
      OR-condition that happened to pass vacuously even after the submenu
      was gone — kept it would misrepresent a deleted feature as covered.
      Both deleted rather than rewritten, since there is nothing left to
      test. test_leader_nested_submenu_sequences's sequence used '<Space>i'
      as inert filler; swapped for a real submenu re-entry to keep the test
      meaningful.
    code_impacts:
      - reasoning: >
          Removed test_leader_submenu_instructions and
          test_leader_visual_instructions_menu; changed
          test_leader_nested_submenu_sequences's key sequence from
          "<Space>a<Esc><Space>i<Esc><Space>t" to
          "<Space>a<Esc><Space>t<Esc><Space>a".
        file: diffviz-review-tui/tests/leader_key_tests.rs
        line_ranges:
          - start: 125
            end: 143
          - start: 278
            end: 291
          - start: 432
            end: 440

  - number: 5
    title: examples/review_navigator.rs and its resources/ fixtures deleted, not demoted to a showcase
    rationale: >
      The roadmap left this as an execution-time judgment call. The file
      was the original DrillNav prototype that this whole plan built from;
      the real implementation (drillnav_browse.rs/drillnav_drill.rs, driven
      via `cargo run --bin review-tui`) is now the canonical, always-in-sync
      example. plan-tui-design's context document doesn't ask for a
      separate standalone showcase. Keeping a second ~900-line copy of the
      same UI would only invite drift.
    code_impacts:
      - reasoning: Deleted; its only consumer (resources/ fixtures) deleted with it.
        file: diffviz-review-tui/examples/review_navigator.rs
        line_ranges:
          - start: 1
            end: 1
