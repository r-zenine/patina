base_commit: f61f187

decisions:
  - number: 1
    title: "Human output targets manual developer review with full tree visualization"
    rationale: "Developers use debug output to understand DiffViz's analysis. Full tree shows complete hierarchy with all node details. ASCII tree (├──, └──) format is readable, portable, and doesn't require special fonts or tools."
    code_impacts: []

  - number: 2
    title: "Use ANSI colors for visual hierarchy without breaking scriptability"
    rationale: "Colors improve readability for manual review (headers bold cyan, relevance levels color-coded). ANSI codes are standard across Unix terminals. If piped to other tools, user can strip codes with sed/tr if needed."
    code_impacts: []

  - number: 3
    title: "Relevance levels color-coded: Essential (green), Important (yellow), Background (dim), Noise (red)"
    rationale: "Color coding provides instant visual recognition of node importance. Green for essential (must understand), yellow for important context, dim for background, red for noise/unnecessary. Matches common semantic conventions."
    code_impacts: []

  - number: 4
    title: "Phases 4, 6, 7 show detailed tree; Phases 1, 2, 3, 5 show summary counts"
    rationale: "Only phases with DiffNode hierarchy benefit from tree visualization. Phase 1 (AST outline), 2 (pair counts), 3 (reviewable diffs list), 5 (renderable lines) are better shown as summaries. Keeps output focused."
    code_impacts: []

  - number: 5
    title: "Include --explain-folding explanations in tree nodes when flag is passed"
    rationale: "Explanations already exist in JSON output (from Phase 4 implementation). When developer uses --human --explain-folding, show same explanations inline in tree for context. No extra computation; just different format."
    code_impacts: []

  - number: 6
    title: "Header section includes file path, language, from/to refs for quick orientation"
    rationale: "Developers need to immediately see what they're analyzing. Header with file, language, git refs provides context before diving into tree details. Matches standard CLI tool patterns."
    code_impacts: []

  - number: 7
    title: "Node format: '[kind] (change_status) [relevance_label]' with optional explanation"
    rationale: "Consistent structure across all nodes. Kind identifies what changed, change_status shows action, relevance_label indicates importance. Explanation (if --explain-folding) appended for full context. Order prioritizes most important info first."
    code_impacts: []
