decisions:
  - number: 1
    title: "Explanation generation using semantic_kind, change_status, and relevance_score"
    rationale: "These three DiffNode attributes are sufficient to generate informative explanations. semantic_kind tells us what language construct changed (function, struct, etc.), change_status tells us what happened (added, deleted, modified, etc.), and relevance_score indicates importance level (ESSENTIAL through NOISE). Together they provide agents with the reasoning behind folding decisions without requiring LLM analysis."
    code_impacts:
      - file: "diffviz-cli/src/commands/debug.rs"
        reasoning: "Added generate_node_explanation() helper function that maps semantic_kind, change_status, and relevance_score to human-readable text"
        line_ranges:
          - start: 353
            end: 398

  - number: 2
    title: "Relevance score constants mapping to readable levels"
    rationale: "The ESSENTIAL=0, IMPORTANT=1, BACKGROUND=2, NOISE=3 constants are already defined in diffviz-core and used throughout. They represent a consistent hierarchy. Mapping them directly to readable labels ('Essential', 'Important', 'Background', 'Noise') ensures consistency with existing relevance scoring throughout the system."
    code_impacts:
      - file: "diffviz-cli/src/commands/debug.rs"
        reasoning: "Used diffviz_core::ast_diff constants (ESSENTIAL, IMPORTANT, BACKGROUND, NOISE) to map numeric scores to readable labels in explanation generation"
        line_ranges:
          - start: 356
            end: 365

  - number: 3
    title: "Explanation format: '{level} relevance: {change} {kind} {node_type}'"
    rationale: "This format puts the most important information first (relevance level), followed by what changed, what kind of construct it is, and the technical node type. Format is consistent across all nodes and languages. Examples: 'Essential relevance: modified function Function', 'Important relevance: added struct MyStruct'. Simple string format is easier to parse and consume than structured objects."
    code_impacts:
      - file: "diffviz-cli/src/commands/debug.rs"
        reasoning: "Generate format string combining relevance_level, change_desc, semantic_desc, and node_type in human-readable order"
        line_ranges:
          - start: 394
            end: 398

  - number: 4
    title: "Explanations added to phases 4, 6, and 7 only"
    rationale: "Phases 4 (Diff Node Hierarchy), 6 (Code Impact), and 7 (Final Output) all display node-level information where explanations are directly relevant. Phase 1 shows AST outline, Phase 2 shows pair counts, Phase 3 shows reviewable diffs list, Phase 5 shows renderable lines - none have individual semantic metadata to explain. Scoping to three phases keeps implementation focused."
    code_impacts:
      - file: "diffviz-cli/src/commands/debug.rs"
        reasoning: "Modified serialize_phase_4() to include explanations conditionally"
        line_ranges:
          - start: 407
            end: 438
      - file: "diffviz-cli/src/commands/debug.rs"
        reasoning: "Modified serialize_phase_6() to include explanations conditionally"
        line_ranges:
          - start: 513
            end: 546
      - file: "diffviz-cli/src/commands/debug.rs"
        reasoning: "Modified serialize_phase_7() to include explanations conditionally"
        line_ranges:
          - start: 548
            end: 581

  - number: 5
    title: "Explanations only generated when --explain-folding flag is passed"
    rationale: "Most agents won't need detailed folding explanations. Making it opt-in via --explain-folding flag keeps baseline output lean and fast. Explanations are only computed on-demand when explicitly requested. No performance regression for existing usage."
    code_impacts:
      - file: "diffviz-cli/src/commands/debug.rs"
        reasoning: "Each phase serialization method checks self.explain_folding before generating explanation text"
        line_ranges:
          - start: 419
            end: 427
          - start: 527
            end: 535
          - start: 562
            end: 570

  - number: 6
    title: "Direct use of diffviz_core types and constants for source of truth"
    rationale: "SemanticNodeKind enum, NodeChangeStatus variants, and RelevanceScore constants are already defined in diffviz_core. Using them directly in explanation generation ensures consistency and makes updates automatic if core types change. No duplication of definitions."
    code_impacts:
      - file: "diffviz-cli/src/commands/debug.rs"
        reasoning: "Import and match on diffviz_core::ast_diff constants and diffviz_core::common::SemanticNodeKind in generate_node_explanation()"
        line_ranges:
          - start: 354
            end: 398
