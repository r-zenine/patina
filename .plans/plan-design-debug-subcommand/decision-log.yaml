decisions:
  - id: "D1"
    type: planning
    decision: "Full Pipeline Exposure - all 7 phases output by default"
    rationale: "Agents may not know which phase caused unexpected behavior. Full transparency is the core value. Filtering optional for advanced use. JSON cost is negligible."
    alternatives_rejected:
      - alternative: "Start with minimal phases"
        reason: "Would require agents to discover which phase matters"
    impact: "Debug output always includes all phase results; --phase flag filters on demand without reducing computation"

  - id: "D2"
    type: planning
    decision: "Line Range as Filter (not constraint) - process entire file then filter ReviewableDiffs"
    rationale: "Follows TUI code-impact processing logic. Lets agents see contextually-related diffs outside exact range. Prevents silently dropping semantic relationships."
    alternatives_rejected:
      - alternative: "Pre-filter before processing"
        reason: "Would hide important context and break semantic understanding"
    impact: "Filter applied post-pipeline using overlap logic: start <= range_end && end >= range_start"

  - id: "D3"
    type: planning
    decision: "Git-Only Input - accept only git refs and file paths; no stdin/inline code"
    rationale: "Agents work with real diffs in real repos. Eliminates language inference complexity. Reuses existing DiffProvider/ReviewEngineBuilder. Aligns with TUI workflow."
    alternatives_rejected:
      - alternative: "Support abstract code samples"
        reason: "Adds complexity; less useful than real repository analysis"
    impact: "Command requires --file (file path) and optional --from/--to (git refs). Language auto-detected from file extension."

  - id: "D4"
    type: planning
    decision: "JSON Output Default - default to JSON; add --human flag for readable output"
    rationale: "Agents parse JSON, not ANSI text. Structured output enables programmatic analysis. Human format secondary."
    alternatives_rejected:
      - alternative: "Human-readable first"
        reason: "Would require agents to parse prose; less reliable"
    impact: "Primary output is JSON by default. --human flag converts to formatted text. Both stored as single code path."

  - id: "D5"
    type: planning
    decision: "Minimal Fixture Export - ReviewFixture contains only old_code, new_code, file_path, language"
    rationale: "Sufficient for test fixture creation. Tests rebuild semantic analysis (that's what we test). Keeps export small and focused."
    alternatives_rejected:
      - alternative: "Export intermediate phases"
        reason: "Would encourage testing pipeline internals instead of code"
    impact: "--export-fixture flag creates minimal JSON; no phase data embedded in fixture"

  - id: "D6"
    type: planning
    decision: "--explain-folding Optional - add folding explanations only when flag passed"
    rationale: "Keeps baseline output lean. Relevance scores already present in JSON. Complex logic worth deferring. Agents ask for it on demand."
    alternatives_rejected:
      - alternative: "Always include explanations"
        reason: "Adds implementation complexity; not always needed"
    impact: "Explanation computation only occurs with --explain-folding flag; baseline output unchanged"

  - id: "D7"
    type: planning
    decision: "Phase 1 AST as Summary - show Tree-sitter AST as structure outline, not full dump"
    rationale: "Full AST too verbose and low-level. Outline sufficient for parsing issues. Agents rarely care about raw AST; they care about semantic tree."
    alternatives_rejected:
      - alternative: "Full AST tree dump"
        reason: "Would bloat output; rarely useful"
    impact: "Phase 1 output simplified to node type outline with line ranges"

  - id: "D8"
    type: architecture
    decision: "Core-then-Integrate Strategy - phases proceed sequentially, each completing and passing tests independently"
    rationale: "Allows incremental testing and verification. Each phase builds on previous. Code always compiles; no broken intermediate states."
    alternatives_rejected:
      - alternative: "Big-bang implementation of all phases at once"
        reason: "Harder to test, debug, and verify correctness incrementally"
    impact: "Implementation proceeds Phase 1 → Phase 2 → ... → Phase 7. Each phase is complete and deployable independently."

  - id: "D9"
    type: architecture
    decision: "Reuse ReviewEngineBuilder - don't duplicate phases 1-5 implementation"
    rationale: "ReviewEngineBuilder already orchestrates semantic analysis pipeline. Avoids duplication and keeps knowledge centralized."
    alternatives_rejected:
      - alternative: "Re-implement pipeline steps in debug command"
        reason: "Code duplication; harder to maintain; risk of divergence"
    impact: "Debug command creates minimal Decision/CodeImpact to feed ReviewEngineBuilder, then formats output"

  - id: "D10"
    type: architecture
    decision: "Wrapper Structs for Serialization - custom #[derive(Serialize)] wrappers for non-Serialize types"
    rationale: "Domain types (DiffNode, SemanticTree) may not have Serialize. Wrappers preserve domain types while enabling JSON output."
    alternatives_rejected:
      - alternative: "Modify domain types to derive Serialize"
        reason: "Would add serde dependency to core crates; couples domain to serialization format"
    impact: "Create SerializableNode, SerializableDiffNode, etc. wrappers in debug.rs command; map domain types before output"
