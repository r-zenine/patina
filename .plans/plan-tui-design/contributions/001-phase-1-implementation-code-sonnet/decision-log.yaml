contribution:
  phase: 1
  type: implementation
  agent: sonnet

decisions:
  - id: D009
    title: Bump ratatui to 0.30 across the workspace to satisfy catppuccin 2.8 ratatui feature
    status: accepted
    rationale: >
      catppuccin 2.8's `ratatui` feature implements `From<catppuccin::Color>` for
      `ratatui_core::style::Color`. In ratatui ≤0.29 the primary Color type is
      re-exported from crossterm, not ratatui-core, so the impl is invisible.
      ratatui 0.30 is the first release where `ratatui::style::Color` is the same
      type as `ratatui_core::style::Color`, making the conversion work without
      extracting RGB values manually.
    code_impacts:
      - file: Cargo.toml
        line_ranges: [{start: 38, end: 38}]
        reasoning: >
          Changed ratatui workspace dependency from "0.28" to "0.30". Also added
          catppuccin = { version = "2.8.0", features = ["ratatui"] } and bumped
          crossterm to 0.29 to align with ratatui 0.30's backend expectations.
      - file: tui-harness/Cargo.toml
        line_ranges: [{start: 8, end: 9}]
        reasoning: >
          tui-harness had its own pinned ratatui = "0.28" and crossterm = "0.28".
          Changed both to { workspace = true }. The Frame type changed in 0.30
          (it now lives in ratatui_core) so mixing versions caused an E0053 type
          mismatch on the ELMApp::draw trait method.
      - file: tui-harness/src/error.rs
        line_ranges: [{start: 7, end: 10}]
        reasoning: >
          ratatui 0.30 TestBackend operations return Result<_, Infallible>. Added
          Infallible(#[from] std::convert::Infallible) variant to TuiError so the
          existing ? operators compile without change.
      - file: sam-tui/Cargo.toml
        line_ranges: [{start: 13, end: 14}]
        reasoning: >
          sam-tui also had pinned ratatui = "0.28" and crossterm = "0.28".
          Changed both to { workspace = true } to resolve the same E0053 Frame
          type mismatch on ELMApp::draw.
    commit: 49e1ea0

  - id: D010
    title: SurfaceRamp index mapping — overlay0 at [3], overlay2 at [4]
    status: accepted
    rationale: >
      The plan specified 8 steps from base (darkest) to text (brightest). The two
      border indices are overlay0 (#6c7086) for inactive borders and overlay2
      (#9399b2) for focused borders. overlay1 is skipped because the perceptual
      jump between overlay0→overlay2 matches the inactive/focused contrast intent
      better than including overlay1 between them would.
    code_impacts:
      - file: tui-design/src/tokens.rs
        line_ranges: [{start: 54, end: 61}]
        reasoning: Ramp construction in Theme::mocha() — indices match context-document table.
    commit: 49e1ea0

  - id: D011
    title: Theme::mocha() called per-function, not as a lazy static
    status: accepted
    rationale: >
      Theme::mocha() is a pure const-equivalent computation (just array indexing
      into a static PALETTE). Making it lazy_static or OnceLock would add a
      dependency and complexity for no observable benefit. The compiler inlines
      the accesses. Passing &Theme to private helper functions keeps the call
      overhead to one construction per public render().
    code_impacts:
      - file: diffviz-review-tui/src/ui/components/status_bar.rs
        line_ranges: [{start: 17, end: 18}]
        reasoning: Representative example of the per-function pattern used in all components.
    commit: 49e1ea0
