commit: 26fba67  # Git hash of the commit containing the code changes described by these decisions
decisions:
  - number: 1
    title: Add decision_instructions as a required field on ReviewState
    rationale: Empty DecisionInstructions is a valid initial state; Option<> would add unwrap noise everywhere and is inconsistent with how approvals and instructions are handled.
    code_impacts:
      - reasoning: Field added to struct and initialized in both constructors
        file: diffviz-review/src/state/mod.rs
        line_ranges:
          - start: 43
            end: 43
          - start: 99
            end: 109
          - start: 115
            end: 140

  - number: 2
    title: Suppress clippy::too_many_arguments on with_review_data with allow attribute
    rationale: Adding the 8th parameter triggered the lint. Introducing a data struct for a single-call-site function would be premature abstraction; the allow attribute is the minimal correct fix.
    code_impacts:
      - reasoning: allow attribute placed directly above the function declaration
        file: diffviz-review/src/state/mod.rs
        line_ranges:
          - start: 115
            end: 116
