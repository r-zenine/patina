commit: b9a5bae  # Git hash of the commit containing the code changes described by these decisions
decisions:
  - number: 1
    title: Reuse ExportMetadata and ImportSummary structs from existing export infrastructure
    rationale: >
      ExportMetadata, ExportFieldDescriptions, and ImportSummary already existed for
      export_instructions_json/import_instructions_json. Reusing them avoids duplication
      and keeps the decision-instruction export format consistent with the file-level export
      format. The only new structs needed were ExportedDecisionInstruction,
      ExportedDecisionInstructions, and DecisionExportScope.
    code_impacts:
      - reasoning: New structs added alongside existing export types
        file: diffviz-review/src/engines/review_engine.rs
        line_ranges:
          - start: 132
            end: 157

  - number: 2
    title: DecisionExportScope mirrors ExportScope pattern with decision-specific variants
    rationale: >
      ExportScope had SingleFile/SingleInstruction/All variants for file-level filtering.
      DecisionExportScope uses SingleDecision(u32)/All — parallel structure but keyed by
      decision number instead of file path or ReviewableDiffId. This keeps the API
      consistent while being appropriate for the decision-level abstraction.
    code_impacts:
      - reasoning: DecisionExportScope enum definition
        file: diffviz-review/src/engines/review_engine.rs
        line_ranges:
          - start: 132
            end: 140

  - number: 3
    title: import_decision_instructions_json skips invalid decisions without failing
    rationale: >
      Matching behavior of import_instructions_json: when a referenced decision does not
      exist in ReviewState, the instruction is skipped and an error message is added to
      ImportSummary.errors rather than returning Err. This lets partial imports succeed
      and gives callers visibility into what was skipped without aborting the entire import.
    code_impacts:
      - reasoning: Skip-with-error logic in import method
        file: diffviz-review/src/engines/review_engine.rs
        line_ranges:
          - start: 933
            end: 945
