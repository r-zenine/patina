commit: "1237b8bdacf95f6838373e7a43640c49b62492a8"

decisions:
  - number: 1
    title: "Manual SchemaTemplate implementation for Phase 1 enables end-to-end validation before macro"
    rationale: "Provides working foundation without proc-macro complexity. Phase 1 can be used independently while Phase 2 macro is developed. Allows testing command/validation infrastructure separately from macro implementation. Minimizes risk by deferring macro until proven approach works."
    code_impacts:
      - file: "diffviz-review/src/templates.rs"
        reasoning: "New module implementing SchemaTemplate trait with manual YAML template generation for DecisionLog"
        line_ranges:
          - start: 1
            end: 142
      - file: "diffviz-review/src/lib.rs"
        reasoning: "Exported templates module and SchemaTemplate trait for use by CLI layer"
        line_ranges:
          - start: 11
            end: 25

  - number: 2
    title: "CLI commands (templates, validate) reuse existing infrastructure and patterns"
    rationale: "Both commands follow established CommandExecutor trait pattern used by Review and Debug commands. Templates command is stateless output; Validate command reuses DecisionLog::parse() logic (DRY principle). Enables rapid integration without custom error handling in CLI layer."
    code_impacts:
      - file: "diffviz-cli/src/commands/templates.rs"
        reasoning: "New command that outputs SchemaTemplate::yaml_template() to stdout"
        line_ranges:
          - start: 1
            end: 58
      - file: "diffviz-cli/src/commands/validate.rs"
        reasoning: "New command that reads file, calls DecisionLog::parse(), provides user-friendly error messages"
        line_ranges:
          - start: 1
            end: 80
      - file: "diffviz-cli/src/commands/mod.rs"
        reasoning: "Exported both templates and validate command modules"
        line_ranges:
          - start: 1
            end: 17
      - file: "diffviz-cli/src/main.rs"
        reasoning: "Added Templates and Validate variants to Commands enum, integrated handlers in match arms"
        line_ranges:
          - start: 9
            end: 275

  - number: 3
    title: "Comprehensive rustdoc on Decision entities becomes Phase 2 macro source"
    rationale: "Doc comments on DecisionLog, Decision, CodeImpact, DecisionLineRange now document schema. Phase 2 derive macro will extract these via rustdoc parsing, eliminating need for duplicate documentation. Establishes single source of truth pattern early."
    code_impacts:
      - file: "diffviz-review/src/entities/decision.rs"
        reasoning: "Added detailed rustdoc to struct and field declarations explaining schema semantics"
        line_ranges:
          - start: 13
            end: 80

  - number: 4
    title: "Backward compatibility alias (base_commit → commit) preserved in schema"
    rationale: "Old YAML files using 'base_commit' field continue to parse via serde alias. Gradual migration path: new templates use 'commit', old files still work. Eventually deprecate alias in major version when migration complete. Smooth transition for users."
    code_impacts:
      - file: "diffviz-review/src/entities/decision.rs"
        reasoning: "Preserved serde(alias = 'base_commit') on commit field with documentation explaining backward compatibility"
        line_ranges:
          - start: 71
            end: 80
