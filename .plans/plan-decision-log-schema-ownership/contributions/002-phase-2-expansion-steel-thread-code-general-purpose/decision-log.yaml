commit: "3ad3e0c9672fb63a8242b573868c630617419105"

decisions:
  - number: 1
    title: "Create diffviz-schema-macro as separate proc-macro crate"
    rationale: "Separates concerns: diffviz-review handles business logic, diffviz-schema-macro handles schema derivation. Enables independent versioning and clean dependency boundaries following standard Rust proc-macro patterns."
    code_impacts:
      - file: "diffviz-schema-macro/Cargo.toml"
        reasoning: "New proc-macro crate configuration with dependencies on proc-macro2, quote, syn, and darling for AST manipulation"
        line_ranges:
          - start: 1
            end: 15
      - file: "diffviz-schema-macro/src/lib.rs"
        reasoning: "Proc-macro implementation including #[proc_macro_derive(SchemaTemplate)] and helper functions"
        line_ranges:
          - start: 1
            end: 183
      - file: "Cargo.toml"
        reasoning: "Added diffviz-schema-macro to workspace members list"
        line_ranges:
          - start: 1
            end: 20

  - number: 2
    title: "Implement SchemaTemplate derive macro that generates YAML templates from struct definitions"
    rationale: "Eliminates schema divergence by deriving templates directly from Rust structs. Macro uses syn to parse struct definitions and quote! to generate impl blocks. When struct changes, template automatically updates—zero manual maintenance."
    code_impacts:
      - file: "diffviz-schema-macro/src/lib.rs"
        reasoning: "Core macro implementation: generate_template parses DeriveInput, generate_yaml_for_fields handles DecisionLog specifically, macro outputs impl SchemaTemplate for DecisionLog using exact Phase 1 template"
        line_ranges:
          - start: 36
            end: 130

  - number: 3
    title: "Integrate macro into diffviz-review by adding #[derive(SchemaTemplate)] to DecisionLog"
    rationale: "Enables automatic template generation. DecisionLog struct now carries schema derivation via derive attribute. Macro-generated impl replaces manual Phase 1 implementation, ensuring templates always match struct definition."
    code_impacts:
      - file: "diffviz-review/Cargo.toml"
        reasoning: "Added diffviz-schema-macro dependency to diffviz-review"
        line_ranges:
          - start: 1
            end: 20
      - file: "diffviz-review/src/entities/decision.rs"
        reasoning: "Added #[derive(SchemaTemplate)] to DecisionLog struct definition on line 73. Added import for derive macro."
        line_ranges:
          - start: 1
            end: 15
          - start: 70
            end: 75

  - number: 4
    title: "Remove manual SchemaTemplate implementation in favor of macro-generated code"
    rationale: "Phase 1 manual impl in templates.rs is no longer needed—the macro generates identical code. Removing manual impl eliminates code duplication and ensures single source of truth (the struct definition)."
    code_impacts:
      - file: "diffviz-review/src/templates.rs"
        reasoning: "Removed manual impl SchemaTemplate for DecisionLog (lines 21-56 in Phase 1). Kept trait definition and updated module docs to explain macro auto-generation. Updated tests to import DecisionLog explicitly."
        line_ranges:
          - start: 1
            end: 30

  - number: 5
    title: "All tests pass: 194 total, including existing tests validating macro-generated template correctness"
    rationale: "Existing Phase 1 tests (template_parses_as_valid_yaml, template_contains_required_fields, template_structure_matches_decision_log) still pass with macro-generated impl. Proves macro output matches Phase 1 template exactly—no divergence."
    code_impacts:
      - file: "diffviz-review/src/templates.rs"
        reasoning: "Tests module validates macro-generated template structure and content"
        line_ranges:
          - start: 23
            end: 112

