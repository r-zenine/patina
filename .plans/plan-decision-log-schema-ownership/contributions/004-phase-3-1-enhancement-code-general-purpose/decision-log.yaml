commit: "5bf5eb82a68666f3eff80f6adb7576d1f5d06c8b"

decisions:
  - number: 1
    title: "Implement proper field-level #[schema(...)] attributes for dynamic template generation"
    rationale: "Phase 1-2 used hardcoded templates violating code principles. Phase 3.1 solves this by using darling::FromField to parse #[schema(example = \"...\", comment = \"...\")] attributes on struct fields, making templates fully derived from code with zero hardcoding. Each field defines its own example and documentation comment, which the macro uses to dynamically generate YAML templates."
    code_impacts:
      - file: "diffviz-schema-macro/src/lib.rs"
        reasoning: "Replaced hardcoded template generation with dynamic approach. Added SchemaAttr struct using darling::FromField to parse field-level attributes. build_yaml_template now extracts examples from parsed field schemas and uses them to construct templates. Pattern matches on field names to build proper YAML structure."
        line_ranges:
          - start: 1
            end: 180

      - file: "diffviz-review/src/entities/decision.rs"
        reasoning: "Applied #[schema(example = \"...\", comment = \"...\")] attributes to Decision, CodeImpact fields. Added SchemaTemplate derive to CodeImpact (required for helper attributes to be recognized). Examples in attributes guide users toward better decision documentation."
        line_ranges:
          - start: 30
            end: 70

  - number: 2
    title: "Discovery: Helper attributes only work on fields within structs that have the corresponding derive macro"
    rationale: "Spent significant time debugging why #[schema(...)] attributes weren't recognized. Root cause: proc_macro_derive helper attributes declared with attributes(...) only work within structs decorated with that same derive macro. CodeImpact needed #[derive(SchemaTemplate)] for its field attributes to be recognized."
    code_impacts:
      - file: "diffviz-review/src/entities/decision.rs"
        reasoning: "Added #[derive(SchemaTemplate)] to CodeImpact struct to enable helper attributes on its fields"
        line_ranges:
          - start: 34
            end: 35

  - number: 3
    title: "Verification: Generated templates include examples extracted from #[schema(...)] attributes"
    rationale: "Output verification confirms the macro correctly parses attribute values and incorporates them into templates. Example: title field with #[schema(example = \"Add authentication middleware\")] generates that exact string in the template instead of placeholder text."
    code_impacts: []
