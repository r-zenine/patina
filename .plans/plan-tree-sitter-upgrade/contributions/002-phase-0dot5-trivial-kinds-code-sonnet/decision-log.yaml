commit: c7a5529
decisions:
  - number: 1
    title: Add !is_named() guard in both build_container_children and build_node
    rationale: >
      Roadmap required guards in both locations. build_node is only called from
      build_container_children today, so the outer guard is sufficient for correctness,
      but adding the guard in build_node makes the function self-consistent and safe
      if call sites are added later. Zero cost — the outer guard eliminates anonymous
      nodes before build_node is reached.
    code_impacts:
      - reasoning: Early-exit guard added before trivial_set check in the inner loop
        file: diffviz-core/src/parsers/generic_builder.rs
        line_ranges:
          - start: 89
            end: 93
      - reasoning: Early-exit guard added at top of build_node before kind lookup
        file: diffviz-core/src/parsers/generic_builder.rs
        line_ranges:
          - start: 121
            end: 124

  - number: 2
    title: Keep Java "true"/"false"/"null" in TRIVIAL_KINDS (ambiguous named-ness)
    rationale: >
      In tree-sitter-java 0.23, boolean and null literals may be anonymous keyword tokens
      or named nodes depending on grammar version. Keeping them in TRIVIAL_KINDS is safe
      either way: if anonymous, the is_named() guard already filters them (table entry is
      dead code but harmless); if named, the table entry correctly suppresses them during
      tree construction. Removing them would risk surfacing them as Unknown nodes in Java
      output if they turn out to be named.
    code_impacts:
      - reasoning: Java TRIVIAL_KINDS retains "true", "false", "null" entries
        file: diffviz-core/src/parsers/java.rs
        line_ranges:
          - start: 53
            end: 105

  - number: 3
    title: Remove Rust "derive"/"Debug"/"Clone"/etc. derive identifiers from TRIVIAL_KINDS
    rationale: >
      These entries matched no actual tree-sitter node kind — derive macro identifiers
      appear as `identifier` nodes with specific text content, not as separate node kinds.
      They were dead code in the table. Removed along with the punctuation/keyword cleanup.
    code_impacts:
      - reasoning: Dead entries removed from RUST_TRIVIAL_KINDS
        file: diffviz-core/src/parsers/rust.rs
        line_ranges:
          - start: 78
            end: 115
