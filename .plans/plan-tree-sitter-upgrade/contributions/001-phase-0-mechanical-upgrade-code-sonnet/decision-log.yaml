commit: 55e173f
decisions:
  - number: 1
    title: Target tree-sitter 0.23 (not 0.24) — LCM of all 8 grammar crates
    rationale: >
      Plan D1 said target 0.24, but the crate landscape shifted: tree-sitter-python,
      tree-sitter-javascript, and tree-sitter-go have no 0.24.x releases (they jumped
      directly from 0.23 to 0.25). Tree-sitter-typescript, java, and cpp top out at 0.23.
      0.23 is the highest version where all 8 grammar crates have compatible releases.
      The key Phase 0 goal (LANGUAGE constant replacing language() fn) is available at 0.23.
    code_impacts:
      - reasoning: Workspace-level tree-sitter version pinned to 0.23; grammar crates added here
        file: Cargo.toml
        line_ranges:
          - start: 23
            end: 51
      - reasoning: All grammar crate deps moved to workspace refs; unused json/css/toml removed
        file: diffviz-core/Cargo.toml
        line_ranges:
          - start: 11
            end: 20
      - reasoning: diffviz-cli grammar deps consolidated to workspace refs
        file: diffviz-cli/Cargo.toml
        line_ranges:
          - start: 28
            end: 32

  - number: 2
    title: Remove tree-sitter-json, tree-sitter-css, tree-sitter-toml from deps
    rationale: >
      No parser implementation exists for JSON, CSS, or TOML (no parsers/json.rs etc.).
      These deps were declared speculatively. tree-sitter-css and tree-sitter-toml are
      stuck at 0.20 with no 0.23-compatible versions; tree-sitter-json starts at 0.24.
      Removing them eliminates version conflict risk and dead weight.
    code_impacts:
      - reasoning: Removed json/css/toml deps from diffviz-core
        file: diffviz-core/Cargo.toml
        line_ranges:
          - start: 11
            end: 20

  - number: 3
    title: set_language() now takes &Language (0.23 API change)
    rationale: >
      tree-sitter 0.23 changed Parser::set_language() signature from Language (by value)
      to &Language (by reference). Fixed all 5 call sites: generic_builder.rs, 4 places
      in semantic_ast.rs, and 2 places in the regression test file.
    code_impacts:
      - reasoning: Production call site in tree-walking pipeline
        file: diffviz-core/src/parsers/generic_builder.rs
        line_ranges:
          - start: 441
            end: 441
      - reasoning: Doctest-style test helper calls in semantic_ast.rs
        file: diffviz-core/src/semantic_ast.rs
        line_ranges:
          - start: 668
            end: 668
          - start: 699
            end: 699
          - start: 751
            end: 751
          - start: 787
            end: 787
      - reasoning: Regression test direct parser usage
        file: diffviz-core/tests/regression_rust_parser_visibility_modifier_classification.rs
        line_ranges:
          - start: 54
            end: 54
          - start: 153
            end: 153
