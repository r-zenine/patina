decisions:
  - id: D1
    title: Target 0.24, not 0.25, for Phase 0
    status: accepted
    rationale: >
      tree-sitter-go, tree-sitter-java, and tree-sitter-cpp top out at 0.23.x as of 2026-06.
      0.25 introduced ABI 15 (DecodeFunction in TSInput) — grammar crates must opt in.
      0.24 is the stable convergence point where all grammars in this project have compatible versions.
      The Supertype API (0.25 only) is deferred to Phase 2, gated on grammar crate readiness.

  - id: D2
    title: Strategy — TDD throughout all phases
    status: accepted
    rationale: >
      The existing test suite (bug_*.rs, regression_*.rs, realistic fixtures) is a complete
      safety net for AST output. Grammar version bumps can silently rename node kinds;
      tests catch this. Phase 1 (field_name_for_named_child) and Phase 2 (supertype
      classification) both benefit from writing the expected behaviour as tests before
      changing the implementation. Zero-warning rule means CI must stay green at every commit.

  - id: D3
    title: Keep LanguageDescriptor::ts_language() return type as tree_sitter::Language
    status: accepted
    rationale: >
      The 0.24 change is in the grammar crate export (language() fn → LANGUAGE constant),
      not in the tree_sitter::Language type itself. The trait interface is unchanged.
      Only the 8 ts_language() implementations change.

  - id: D4
    title: Phase 1 — audit field_name_for_named_child before committing to use it
    status: accepted
    rationale: >
      The mut_pattern case in rust.rs:230-237 walks children manually because the 0.20
      grammar has no named field on mut_pattern. The 0.23/0.24 Rust grammar may have
      added named fields. Verify via Language::field_count() and grammar inspection
      before writing replacement code. If the field is still unnamed, keep the cursor walk.

  - id: D5
    title: Phase 2 — supertype API augments kind_map/trivial_set, not replaces descriptor tables
    status: superseded
    superseded_by: D9
    rationale: >
      Descriptors still need semantic_kind_map for construction kinds (Function, Struct, etc.)
      because supertypes only cover abstract grammar categories (_expression, _statement, _type).
      The supertype API adds an auto-derived layer on top: any kind whose grammar supertype
      is _expression gets SemanticNodeKind::Expression; _statement gets Statement; etc.
      This reduces drift without removing the ability to override specific kinds.

  - id: D6
    title: diffviz-cli tree-sitter deps aligned with diffviz-core
    status: accepted
    rationale: >
      diffviz-cli also declares tree-sitter and grammar crates directly. These must be
      bumped to the same versions as diffviz-core, or consolidated into workspace deps.
      Prefer workspace deps to guarantee a single resolved version across crates.

  - id: D7
    title: Phase 0.5 — use Node::is_named() to eliminate anonymous TRIVIAL_KINDS entries
    status: accepted
    rationale: >
      Anonymous nodes (punctuation, keywords, operators) always return is_named() == false.
      They account for ~40-50% of each TRIVIAL_KINDS table. Adding a !child.is_named()
      guard in build_container_children before the trivial_set lookup eliminates all of
      them without any table maintenance. Available since tree-sitter 0.1 — no version
      dependency. The two APIs (is_named and supertypes) address disjoint node populations
      and are complementary, not redundant.

  - id: D8
    title: Phase 2 targets four supertypes — _expression, _statement, _type, _literal
    status: superseded
    superseded_by: D9
    rationale: >
      _expression and _statement cover SEMANTIC_KIND_MAP classification-only entries.
      _type covers TypeDefinition entries (type_alias etc.) which are also classification-only.
      _literal covers named-but-trivial entries remaining in TRIVIAL_KINDS after Phase 0.5
      (string_literal, integer_literal, float_literal, etc.) — these are named nodes that
      is_named() cannot filter, but _literal supertypes can identify automatically.
      All four must be probed per-grammar first (2.1) since not all grammars expose
      identical supertype names.

  - id: D9
    title: Drop Phase 2 (Supertype API) from the active roadmap
    status: accepted
    rationale: >
      Probe findings (2026-06) falsified Phase 2's founding premise: Java, C, and C++ —
      the grammars Phase 2 was designed to benefit most — expose zero _expression or
      _statement supertypes. Remaining benefit is ~11 entries in Rust only.
      Additionally, go/java/cpp grammar crates top out at 0.23 (ABI 14); Language::supertypes()
      requires ABI 15 (0.25), so even the grammars that do expose supertypes are not
      queryable at installable versions. A GenericSemanticTreeBuilder::new() that does
      grammar introspection for 1–2 languages and no-ops for 6 violates the project's
      no-speculative-abstraction ethos (CLAUDE.md).
      Deferred: if the project upgrades to tree-sitter 0.25 for other reasons, revisit
      _literal auto-trivialization for Rust (tree_sitter_rust exposes _literal with ~6 subtypes).
