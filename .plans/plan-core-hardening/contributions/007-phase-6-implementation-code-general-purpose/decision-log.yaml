commit: "f2ebb04"

decisions:
  - number: 1
    title: "Mechanical reuse of the Phase 5 mechanism for JavaScript and Java — no new code paths"
    rationale: >
      JavaScript's class_declaration and Java's class_declaration/
      interface_declaration/enum_declaration all use a tree-sitter field
      literally named "body" for their container (verified empirically via
      to_sexp() dumps before writing any code, per the roadmap's explicit
      instruction not to trust memory for grammar field names). Both languages
      already classify top-level variables directly (JS lexical_declaration/
      variable_declaration, Java field_declaration) with no wrapper-kind issue
      like Python's, so only container_body_field needed wiring — no builder or
      decision_based_diff.rs changes were necessary; is_recursable_container
      (Phase 5) already generalizes to any DataStructure with populated
      children regardless of language.
    code_impacts: []

  - number: 2
    title: "C++ gains two new construction-kind classifications (struct_specifier: Struct, namespace_definition: Module), not just container_body_field wiring"
    rationale: >
      Unlike JS/Java, C++'s CppDescriptor was missing struct_specifier and
      namespace_definition from its semantic_kind_map entirely (verified by
      reading the file before changing it) — C++ structs were never classified
      at all (Unknown-wrapper fallback if non-empty, else dropped), and
      namespace-nested functions were only reachable by accident: build_node's
      "unrecognised kind but has semantic children" fallback recursively wrapped
      namespace_definition -> declaration_list -> function_definition in nested
      Unknown nodes. That accidental path satisfies find_unit_recursive (which
      recurses into any node's children regardless of type) for the single-unit
      expand case, but NOT the decompose case: is_recursable_container only
      recognizes Module/DataStructure, so an Unknown wrapper node that happens to
      fully contain a requested range would be reported as a leaf by
      find_contained_units_recursive, never decomposing into the individual
      functions it wraps. Classifying namespace_definition as Module (mirroring
      Rust's mod_item) and wiring container_body_field("namespace_definition")
      = Some("body") replaces the accidental path with the same explicit,
      qualified-name-aware, decompose-correct mechanism every other container
      uses. struct_specifier was classified as Struct (parallel to class_specifier
      as Class) since C++ structs and classes share identical body-recursion
      needs (both use a "body" field pointing at field_declaration_list).
    code_impacts:
      - file: "diffviz-core/src/parsers/cpp.rs"
        reasoning: >
          [Structural - Core entity shape change] Two previously-unclassified
          tree-sitter node kinds (struct_specifier, namespace_definition) now
          produce typed SemanticNodes instead of falling through to Unknown or
          being dropped. A reviewer must verify no downstream consumer depended
          on C++ namespaces/structs being absent from the semantic tree (e.g.
          treating a namespace's functions as top-level Function units at the
          module root rather than nested under a Module unit) — qualified names
          for namespace-nested functions now include the namespace prefix
          ("ns::baz" instead of bare "baz"), which changes
          find_semantic_unit_by_name's old/new pairing key for those functions.
        line_ranges:
          - start: 16
            end: 21
          - start: 102
            end: 108
