commit: ""

decisions:
  - number: 1
    title: "Add ReviewSummary domain struct and summarize_review_state() to diffviz-review"
    rationale: "Cross-referencing decision-log.yaml against review-state.json is domain logic, not CLI logic. Putting it in diffviz-review makes it unit-testable and keeps diffviz-cli as a thin I/O layer. The function reads both files and returns a ReviewSummary with approved/unapproved decisions and instructions."
    code_impacts:
      - file: "diffviz-review/src/summary.rs"
        reasoning: "New file — ReviewSummary struct with approved_decisions, unapproved_decisions, active_instructions, addressed_instructions, commit, contribution_folder, and a to_yaml() method"
        line_ranges:
          - start: 1
            end: 80
      - file: "diffviz-review/src/persistence.rs"
        reasoning: "Add pub fn summarize_review_state(folder: &Path) -> Result<ReviewSummary, PersistenceError> — reads decision-log.yaml and review-state.json, computes cross-reference"
        line_ranges:
          - start: 120
            end: 160
      - file: "diffviz-review/src/lib.rs"
        reasoning: "Add pub mod summary and re-export ReviewSummary and summarize_review_state"
        line_ranges:
          - start: 1
            end: 24

  - number: 2
    title: "Add diffviz display review subcommand to diffviz-cli"
    rationale: "The user wants the command as diffviz display review <folder>. This requires a Display subcommand in main.rs with a nested Review sub-subcommand. The command is in the same category as Templates and Validate — no git repo needed, no Environment needed."
    code_impacts:
      - file: "diffviz-cli/src/commands/display.rs"
        reasoning: "New file — DisplayReviewCommand that calls summarize_review_state and prints YAML to stdout"
        line_ranges:
          - start: 1
            end: 40
      - file: "diffviz-cli/src/commands/mod.rs"
        reasoning: "Add pub mod display"
        line_ranges:
          - start: 6
            end: 9
      - file: "diffviz-cli/src/main.rs"
        reasoning: "Add Commands::Display enum variant with nested DisplayCommands::Review { folder }, wire dispatch in the match block"
        line_ranges:
          - start: 49
            end: 96
