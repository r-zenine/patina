commit: 18295a4
decisions:
  - number: 1
    title: Remove Phase 1 & 2 stubs — return None (phase not supported)
    rationale: ReviewEngine exposes no semantic tree or pairing data. Returning hardcoded empty/zero values was dishonest. None is the correct signal — serde omits the field from JSON, which is honest about what is implemented.
    code_impacts:
      - reasoning: serialize_phase_1 now returns None instead of fake empty nodes array
        file: diffviz-cli/src/commands/debug.rs
        line_ranges:
          - start: 409
            end: 417
      - reasoning: serialize_phase_2 now returns None instead of hardcoded zero counts
        file: diffviz-cli/src/commands/debug.rs
        line_ranges:
          - start: 419
            end: 431

  - number: 2
    title: Extract serialize_impact_phase helper — phases 6 & 7 share identical logic
    rationale: Phase 6 and 7 were ~80 lines of duplicate code. The only difference was the type_label string and the JSON output key name. Extracting a shared helper with a type_label parameter eliminates the duplication (Kent Beck No Duplication rule). Phase 7 JSON key changed from "summary" to "impacted_areas" to match phase 6 — both are debug output, this is not a stable public contract.
    code_impacts:
      - reasoning: serialize_phase_6 delegates to shared helper
        file: diffviz-cli/src/commands/debug.rs
        line_ranges:
          - start: 532
            end: 540
      - reasoning: serialize_phase_7 delegates to shared helper
        file: diffviz-cli/src/commands/debug.rs
        line_ranges:
          - start: 542
            end: 550
      - reasoning: New serialize_impact_phase helper — canonical implementation for both phases
        file: diffviz-cli/src/commands/debug.rs
