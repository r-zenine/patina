commit: "43976b7"

decisions:
  - number: 1
    title: Remove TerminalBackend enum and Config field entirely
    rationale: |
      The TerminalBackend enum had a single Crossterm variant with a comment listing future
      variants (Termion, TestBackend, WebBackend). Removing the Config.terminal_backend field
      and the builder method made the enum dead code, so it was removed entirely rather than
      kept as a comment stub. This avoids a dead_code warning and removes speculative design
      with no current use case. YAGNI: don't keep code for hypothetical future needs.
    code_impacts:
      - file: diffviz-cli/src/environment.rs
        reasoning: Removed terminal_backend field from Config, TerminalBackend enum, and builder method
        line_ranges:
          - start: 14
            end: 34

  - number: 2
    title: Remove terminal_backend threading from Config through EnvironmentBuilder to main
    rationale: |
      The terminal_backend config field was threaded through Config -> EnvironmentBuilder -> main.rs
      but never read downstream (no code in Environment or engines used it). Dead config fields
      that carry weight through dependency chains without being consumed are Sufficient Design
      violations. Removed the field, default value, builder method, and the single call site in main.rs.
    code_impacts:
      - file: diffviz-cli/src/environment.rs
        reasoning: Removed terminal_backend field, default assignment, builder method, and test assertions
        line_ranges:
          - start: 14
            end: 122
      - file: diffviz-cli/src/main.rs
        reasoning: Removed TerminalBackend from import and .terminal_backend(TerminalBackend::Crossterm) builder call
        line_ranges:
          - start: 19
            end: 270

  - number: 3
    title: Simplify ReviewCommand::new() to zero-argument constructor
    rationale: |
      ReviewCommand::new() accepted three Option<String> parameters (_file_filter, _from_commit,
      _to_commit) that were all prefixed with _ and never used. The command always returns an
      error (deprecated command). Removing unused parameters removes dead interface surface and
      makes the deprecation intent clearer. The Commands::Review match arm updated to use `..`
      to ignore all fields.
    code_impacts:
      - file: diffviz-cli/src/commands/review.rs
        reasoning: Simplified new() constructor to zero arguments
        line_ranges:
          - start: 15
            end: 21
      - file: diffviz-cli/src/main.rs
        reasoning: Updated match arm to Commands::Review { .. } and call to ReviewCommand::new()
        line_ranges:
          - start: 281
            end: 288
