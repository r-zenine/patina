commit: c2c55ab
decisions:
  - number: 1
    title: Test at RenderableDiff boundary, not extract_semantic_anchor directly
    rationale: Testing extract_semantic_anchor directly would couple tests to the string-scanner internals that will be deleted. Testing via RenderableDiff::try_from ensures tests survive the refactor unchanged.
    code_impacts:
      - reasoning: New integration test file covering all anchor cases at the public API level
        file: diffviz-core/tests/renderable_diff_anchor_tests.rs
        line_ranges:
          - start: 1
            end: 231

  - number: 2
    title: Mark rust_enum_decl as ignored — pre-existing classification bug, not a test gap
    rationale: enum_item is classified as DataStructure in GenericSemanticTreeBuilder; unit_type_to_semantic_kind maps DataStructure to SemanticNodeKind::Struct, so extract_enum_anchor is never called. The ignore documents desired future behavior rather than hiding the failure silently.
    code_impacts:
      - reasoning: Test is present but ignored; ignore message explains the root cause
        file: diffviz-core/tests/renderable_diff_anchor_tests.rs
        line_ranges:
          - start: 96
            end: 112
