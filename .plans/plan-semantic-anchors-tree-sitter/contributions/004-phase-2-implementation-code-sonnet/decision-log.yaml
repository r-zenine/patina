commit: "b50fc4ff037cbc6dad21c9801354b5b7e6d75796"

decisions:
  - number: 1
    title: Anchor a line by matching descendant start_byte against the line's byte range, not point-containment
    rationale: >
      The roadmap's sketch used "find the deepest node whose byte range contains
      line_byte_start" — a single point. That breaks for any line with leading
      indentation: whitespace before a token isn't covered by any node's byte
      range (tree-sitter nodes start at the first real token), so the point often
      falls in a gap between sibling statements and the walk bottoms out on a
      container (e.g. `block`) instead of the actual declaration. Rewriting the
      match as "does this node's own start_byte fall within
      [line_byte_start, line_byte_start + line.len())" is immune to leading
      whitespace, since the declaration's first token is still on the same line
      regardless of indentation. Children are checked before the node itself so a
      nested anchor (e.g. a `let_declaration` inside a function body) always wins
      over the enclosing container.
    code_impacts:
      - reasoning: >
          [Behavioral - Control flow at boundaries] Replaced pure byte-containment
          walk with start-byte-in-line-range matching; this is the entire anchor
          resolution algorithm, so an error here silently produces wrong or
          missing anchors for every anchor type.
        file: diffviz-core/src/renderable_diff/semantic_anchors.rs
        line_ranges:
          - start: 1
            end: 76

  - number: 2
    title: Fix create_single_source_lines to pass absolute byte offsets, not boundary-relative ones
    rationale: >
      line_utils.rs computes line byte ranges relative to the extracted boundary
      text (starting at 0), while the DiffNode tree's OwnedNodeData byte ranges
      are absolute offsets into the full parsed source. For any boundary that
      doesn't start at byte 0 of the file (e.g. a Go function preceded by a
      package clause), this mismatch meant no descendant's absolute start_byte
      could ever fall inside the boundary-relative line range, so anchors would
      silently disappear. Fixed by adding `boundary_start_byte` back before
      calling extract_semantic_anchor.
    code_impacts:
      - reasoning: >
          [Behavioral - Invariant mutation] Anchor lookups now operate in the
          same coordinate space as the DiffNode tree; without this, go_func and
          go_method (and any future case where the boundary doesn't start at
          byte 0) would receive wrong anchors post-refactor even though the
          new tree-walk logic itself is correct.
        file: diffviz-core/src/renderable_diff/line_utils.rs
        line_ranges:
          - start: 61
            end: 66

  - number: 3
    title: Populate identifier on grammar-level DiffNode children, not just semantic boundary nodes
    rationale: >
      Phase 1 only set `identifier` on the top-level boundary DiffNode
      (OwnedNodeData::with_identifier at the addition/deletion/modification
      construction sites in decision_based_diff.rs). Children built by
      build_child_nodes_recursive (e.g. a `let_declaration` nested inside a
      function body) always used from_tree_sitter_node, which hardcodes
      identifier: None. Since anchors for variable bindings need to be resolved
      against these nested children, not just the boundary, this made
      rust_let_binding/rust_let_mut_binding/rust_const_item structurally
      unfixable by the tree walk alone. Fixed by adding `extract_identifier` to
      the `LanguageParser` trait (delegating to `LanguageDescriptor` on
      `GenericSemanticTreeBuilder`, wired through the 4 core language wrappers),
      threading `source: &str` into build_child_nodes_recursive, and calling it
      for every child.
    code_impacts:
      - reasoning: >
          [Structural - Interface contract change] Added `extract_identifier`
          to the `LanguageParser` trait with a default returning `None`; any
          future implementor that wants identifiers on non-boundary DiffNodes
          must override it (mirrors the existing classify_node_kind pattern).
        file: diffviz-core/src/common.rs
        line_ranges:
          - start: 137
            end: 172
      - reasoning: >
          [Behavioral - Control flow at boundaries] build_child_nodes_recursive
          now takes `source: &str` and calls parser.extract_identifier per
          child, using with_identifier instead of from_tree_sitter_node. This
          changes every child DiffNode built by the decision-based diff pipeline
          to carry an identifier where the language descriptor provides one.
        file: diffviz-core/src/decision_based_diff.rs
        line_ranges:
          - start: 245
            end: 279
          - start: 381
            end: 419
      - reasoning: >
          [Structural - Public API] RustParser/GoParser/PythonParser/TypeScriptParser
          each gained an `extract_identifier` override delegating to the wrapped
          GenericSemanticTreeBuilder; without it the trait default (None) would
          silently apply despite the descriptor supporting extraction.
        file: diffviz-core/src/parsers/rust.rs
        line_ranges:
          - start: 218
            end: 224

  - number: 4
    title: Drop FieldAssignment and MethodCall from SemanticAnchorType
    rationale: >
      Confirmed via grep that no code outside semantic_anchors.rs constructed or
      matched on these two variants. They were produced by string pattern
      matching (`obj.field =`, `obj.method(`) with no AST-level equivalent, as
      flagged in the roadmap's risk register. Removed per the plan rather than
      stubbing them out to always return None.
    code_impacts:
      - reasoning: >
          [Structural - Public API] Removed two enum variants from
          SemanticAnchorType, a type reachable from diffviz-review and diffviz-cli
          through RenderableLine::semantic_anchor.
        file: diffviz-core/src/renderable_diff/mod.rs
        line_ranges:
          - start: 88
            end: 96
