commit: "da09ac5e71dd57c588f12dc3eda90154cc63d0b7"

decisions:
  - number: 1
    title: Track independent old-side and new-side byte cursors instead of a single offset
    rationale: >
      The pre-fix code tracked one `current_byte_offset` (relative to the new
      boundary) for Keep/Add lines and passed a literal 0 everywhere else. A
      Modified diff has two divergent coordinate spaces — old_node.start_byte
      for text that only exists in the old file (Delete lines, the old half of
      Modify) and new_node.start_byte for text that only exists in the new file
      (Add lines, the new half of Modify, and the anchor precomputation used to
      drive Myers pairing). Reusing a single counter across both sides would
      silently misalign as soon as old and new line lengths diverge. Introduced
      `old_current_byte_offset` alongside the existing `current_byte_offset`,
      and two more cursors (`old_byte_cursor` / `new_byte_cursor`) for the
      upfront anchor precomputation that feeds `myers_diff_semantic`.
    code_impacts:
      - reasoning: >
          [Behavioral - Invariant mutation] Every extract_semantic_anchor call
          site in create_line_by_line_diff_for_modified now receives a real
          byte offset instead of a literal 0; this changes actual output
          (previously every line queried byte 0 of the DiffNode tree, usually
          returning either the wrong anchor or None).
        file: diffviz-core/src/renderable_diff/mod.rs
        line_ranges:
          - start: 140
            end: 340

  - number: 2
    title: Keep lines advance both old and new cursors identically; Delete/Add/Modify advance only their own side
    rationale: >
      A Keep line's text is byte-identical in both old and new sources by
      definition (that's why Myers classified it as Keep), so both cursors
      move forward by the same `line.len() + 1`. Delete lines only exist in
      the old text, so only old_current_byte_offset advances. Add lines only
      exist in the new text, so only current_byte_offset advances. Modify
      splits into an old half (advances old_current_byte_offset) and a new
      half (advances current_byte_offset), matching how the function already
      renders Modify as two separate RenderableLines.
    code_impacts: []

  - number: 3
    title: Anchor lookups for Delete lines and the old half of Modify use old-source byte offsets against a tree built only from the new file
    rationale: >
      The DiffNode tree's children (built by build_child_nodes_recursive) are
      constructed exclusively from the new semantic unit's tree_sitter_node —
      there is no old-file AST represented anywhere in the boundary tree. Using
      old_node.start_byte-relative offsets to query this new-only tree is an
      approximation: it is only meaningful for the portion of the old text that
      structurally lines up with the new text (the common case for small
      content edits), and will simply miss (return None) for regions that
      diverged in length/structure before the current line. This matches the
      roadmap's explicit Phase 3 design (D4) and is a known, accepted limit —
      building a dual-source (old+new) DiffNode tree is out of scope for this
      plan.
    code_impacts:
      - reasoning: >
          [Behavioral - Error path change] Delete-line and old-half-of-Modify
          anchors can silently return None even when a "real" anchor exists in
          the old file, whenever old/new byte layouts have drifted upstream of
          that line. This is a known, accepted approximation, not a bug to fix
          in a follow-up unless a future plan tackles dual-source anchoring.
        file: diffviz-core/src/renderable_diff/mod.rs
        line_ranges:
          - start: 219
            end: 240
          - start: 297
            end: 310
