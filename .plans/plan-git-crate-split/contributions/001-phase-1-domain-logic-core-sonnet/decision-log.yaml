commit: "ee6c832bbdaa7bc27861bd0f0f31dcafe577cccb"

decisions:
  - number: 1
    title: Consolidated duplicated diff-iteration loops into two private helper functions
    rationale: >
      diffviz-git/src/lib.rs had two near-identical additions/deletions counting
      loops (one for commit-to-commit diffs, one for working-directory diffs)
      and two near-identical file-status-collection closures (same duplication
      pattern). Rather than copying each duplicate verbatim per the roadmap's
      "moved verbatim" instruction, extracted `count_additions_deletions` and
      `collect_diff_files` as private free functions shared by both call sites.
      This is a same-crate, same-behavior consolidation (not a design change) —
      it removes an exact code duplication that would otherwise be carried over
      unchanged into the new crate, and keeps `cargo clippy` clean without
      needing any allow-attributes.
    code_impacts:
      - file: "libs/gitkit/src/lib.rs"
        reasoning: >
          [Structural - Public API] Establishes gitkit's public API surface for
          the first time: `GitRepository::open`, `get_file_content_at_commit`,
          `get_file_stats_for_commits` (and its two backing variants),
          `get_diff_files`, `get_working_directory_files`,
          `resolve_parent_commit`, plus `RawFileStats`/`RawFileStatus`/`Error`.
          Phase 2's adapter crate will delegate to exactly this method set, so
          any future signature change here is a breaking change for Phase 2.
        line_ranges:
          - start: 1
            end: 386

  - number: 2
    title: Duplicated TestRepo test helper into libs/gitkit/tests/test_utils.rs rather than sharing across crates
    rationale: >
      Per decision-log D001 in the plan (gitkit must have zero diffviz-review/
      diffviz-core dependency) and the context-document's note that sharing
      test helpers across crates would require an artificial dev-dependency
      just for tests, `TestRepo` was copied (not imported) from
      diffviz-git/tests/test_utils.rs into gitkit's own tests/test_utils.rs.
      Both copies are now independently maintained; this is intentional
      duplication, not an oversight.
    code_impacts: []
