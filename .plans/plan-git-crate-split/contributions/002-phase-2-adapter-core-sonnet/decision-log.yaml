commit: "242aedf4bb8018f2ad972fd990aea937055d771b"

decisions:
  - number: 1
    title: "GitError collapsed to a single transparent Core(#[from] gitkit::Error) variant"
    rationale: >
      All of the original GitError's variants (Git, RepositoryNotFound,
      InvalidCommit, StagingFailed, PatchCreationFailed, Io, ValidationFailed)
      were already review-agnostic and moved into gitkit::Error verbatim in
      Phase 1. Since the adapter no longer constructs any of these directly
      (every git2-touching call now goes through gitkit::GitRepository and
      returns gitkit::Error), keeping a full mirrored set of local variants
      would just be dead duplication. Chose the single #[error(transparent)]
      Core(#[from] gitkit::Error) wrapper instead — the roadmap explicitly
      anticipated this shape and pre-authorized adjusting
      diffviz-git/tests/error_handling.rs's variant-matching patterns to
      account for it (see code_impacts below), since the plan's zero-behavior-
      change goal is about runtime behavior, not GitError's exact Rust shape.
    code_impacts:
      - file: "diffviz-git/src/lib.rs"
        reasoning: >
          [Structural - Public API] GitError's variant shape changed from 7
          named variants to a single Core(gitkit::Error) wrapper. Any external
          code matching on diffviz_git::GitError's old variants directly
          (rather than via the impl From<GitError> for DiffVizError path) would
          need to match through Core(gitkit::Error::Variant { .. }) instead.
        line_ranges:
          - start: 6
            end: 10
      - file: "diffviz-git/tests/error_handling.rs"
        reasoning: >
          [Structural - Public API] Rewrote all six tests that construct
          GitError variants directly (GitError::Git, ::RepositoryNotFound,
          ::InvalidCommit, ::StagingFailed, ::PatchCreationFailed) to
          construct GitError::Core(gitkit::Error::Variant { .. }) instead.
          Test intent and assertions are unchanged — only the construction
          path and match pattern were updated, per the roadmap's explicit
          allowance for this adjustment.
        line_ranges:
          - start: 1
            end: 105

  - number: 2
    title: "get_source_code's 'file not found' error now a plain std::io::Error instead of a constructed GitError::Git"
    rationale: >
      The original impl constructed `Box::new(GitError::Git(git2::Error::from_str(\"File not found\")))`
      for the Unstaged and Staged/default not-found cases, which required the
      adapter to reference git2 types directly. Since Phase 2's goal is to
      drop diffviz-git's direct git2 dependency (git2 moved to
      [dev-dependencies], only used by error_handling.rs's test fixtures), this
      path now returns a plain `std::io::Error` with `ErrorKind::NotFound`
      instead. Behavior at the DiffProvider trait boundary is unchanged (still
      `Box<dyn std::error::Error>`, still surfaces as an error for a missing
      file) — only the concrete error type changed, and nothing downstream
      matches on it as a GitError.
    code_impacts:
      - file: "diffviz-git/src/lib.rs"
        reasoning: >
          [Behavioral - Error path change] get_source_code's not-found path no
          longer constructs a git2::Error; callers relying on
          Box<dyn Error>::downcast_ref::<GitError>() for this specific failure
          (none currently do) would need updating.
        line_ranges:
          - start: 174
            end: 194
