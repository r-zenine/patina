commit: null

decisions:
  - number: 1
    title: Sessions survive every error class; only quit and EOF end them
    rationale: >
      The REPL exists to eliminate O(n^2) prefix replay, so accumulated app
      state is the asset. Killing the session on a malformed line or an app
      error mid-sequence destroys exactly what the feature protects. Errors
      respond with ok:false (keys errors add applied:N for partial
      application) and the loop continues; the agent can render to
      re-observe.
    code_impacts: []

  - number: 2
    title: Uniform observation envelope — keys and render return state + visual + affordances
    rationale: >
      One schema for every observation keeps the agent loop single-parse.
      Omitting visual to save bytes would make the common act-then-look flow
      two commands; affordances close the discovery loop per Phase 3.
      Responses are compact single-line JSON because line framing is the
      protocol.
    code_impacts: []

  - number: 3
    title: should_quit does not end the REPL session
    rationale: >
      A key sequence containing q would otherwise kill the session as a side
      effect, and the final state (should_quit: true) would be unobservable.
      The snapshot carries the flag; the parent process owns the child's
      lifetime and decides.
    code_impacts: []
