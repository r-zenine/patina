commit: "178ee2769746bf29dc67e0b4675e91dfcd795a74"
decisions:
  - number: 1
    title: describe() returns Option<AppDescription>; harness assembles the manifest
    rationale: >
      The roadmap sketched describe() -> AppManifest, but the manifest
      contains two harness-generated sections the app must not author: the
      notation grammar (owned by the input parser) and the snapshot JSON
      Schema (generated from M::Snapshot). Splitting app-authored
      AppDescription from harness-assembled AppManifest keeps apps unable to
      lie about either, and Option gives the roadmap's
      "explicitly-marked-empty" requirement a precise encoding: described:
      false in the manifest means the app relies on trait defaults, which
      agents can distinguish from an unsupported flag.
    code_impacts:
      - reasoning: "[Structural - Interface contract] ELMApp::Snapshot bound tightened to Serialize + schemars::JsonSchema and two defaulted methods added — external implementors (none outside this workspace) must add a JsonSchema derive; in-workspace impls (StateSnapshot, SamSnapshot, examples) were migrated in this commit"
        file: tui-harness/src/traits.rs
        line_ranges:
          - start: 9
            end: 55
  - number: 2
    title: Notation grammar generated from the parser's own key tables
    rationale: >
      parse_key_code was a 28-arm match; the manifest needed the same list.
      Rather than write the list twice (drift copy — the exact failure mode
      this plan exists to kill), the match was replaced by a SPECIAL_KEYS
      const table that both the parser lookup and NotationDoc::grammar()
      read. The parser and its documentation are now structurally incapable
      of disagreeing.
    code_impacts:
      - reasoning: "[Behavioral - Control flow at boundaries] Key-name parsing switched from match arms to table lookup — reviewer should verify the table is byte-identical to the old arms (the 20 pre-existing parser tests pin this)"
        file: tui-harness/src/input_parser.rs
        line_ranges:
          - start: 156
            end: 220
  - number: 3
    title: Snapshot JsonSchema derives for diffviz and sam pulled forward from Phase 2
    rationale: >
      The roadmap placed the StateSnapshot/SamSnapshot derives in Phase 2b,
      but the Snapshot bound tightens in this phase and the plan requires the
      workspace to compile at every phase boundary — the compiler forces the
      derives now. This is mechanical fallout of decision 1, recorded only to
      explain the roadmap deviation; Phase 2 keeps its real work (main.rs
      migration, describe() override, golden output tests).
    code_impacts: []
  - number: 4
    title: Unknown agent-CLI flags are loud errors, not pass-through
    rationale: >
      An agent typo (--decribe) that silently launched the interactive TUI
      would hang a headless session forever — the worst failure mode for the
      audience this CLI serves. parse_agent_args therefore rejects anything
      it does not recognize (new TuiError::Usage variant) instead of falling
      through to Run. Consequence for Phase 2: review-tui's main.rs must
      route its own flags before delegating, or accept that only the agent
      surface exists on that binary.
    code_impacts:
      - reasoning: "[Behavioral - Error path change] No-flag invocation runs the real TUI while any unrecognized flag errors — reviewer should confirm this split matches how diffviz main.rs will delegate in Phase 2"
        file: tui-harness/src/agent_cli.rs
        line_ranges:
          - start: 36
            end: 72
