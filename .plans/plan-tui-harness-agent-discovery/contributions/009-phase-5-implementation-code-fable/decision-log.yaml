commit: "c59bc468b04b16c9230a4501a3acd316da80f201"
decisions:
  - number: 1
    title: SAM_BINDINGS const feeds describe() and affordances(), filtered by construction config
    rationale: >
      Per the 008 design: registry-free (D006) but single-sourced, so sam's
      manifest and affordances cannot disagree with each other. Rows carry
      requires_options / requires_multi_select flags because sam's key
      surface is config-dependent (key_transformer gates Esc on has_options
      and Ctrl-s/Ctrl-a on allow_multi_select) — advertising Mark to an
      agent driving a single-select modal would be a lie the tests now
      forbid. Event labels use sam's AppEvent variant names verbatim
      (including the "Entr" spelling) — honest to the code over cosmetic.
    code_impacts:
      - reasoning: "[Structural - Interface contract] SAM_BINDINGS is hand-written and must be kept in sync with key_transformer in view.rs — unlike diffviz there is no structural guarantee; a binding change in key_transformer without a matching row here silently lies to agents"
        file: sam-tui/src/modal_view/headless.rs
        line_ranges:
          - start: 16
            end: 95
  - number: 2
    title: Agent entry is the modal_agent example, per the 008 design
    rationale: >
      Fixture-driven example binary (MockValue items + one OptionToggle,
      multi-select on): zero production CLI impact, mirrors kitchen_sink,
      reuses the test suite's own fixture shape. sam-cli's arg surface is
      untouched.
    code_impacts: []
  - number: 3
    title: Skill docs now route agents through --describe; drift copy #4 retired
    rationale: >
      The diffviz-tui-contribution skill's harness sections pointed agents
      at reading src/events/input.rs and required --features test-harness
      for CLI modes (no longer true since Phase 2). Updated: discover-first
      workflow, --agent-repl documented, the registry named as the only
      place for bindings, and two new review rejection criteria (no key
      matching outside the registry; never edit the characterization suite
      to make a refactor pass). The end-to-end plan gate passed on both
      apps: manifest → drive → observe affordance change, no source
      reading.
    code_impacts: []
