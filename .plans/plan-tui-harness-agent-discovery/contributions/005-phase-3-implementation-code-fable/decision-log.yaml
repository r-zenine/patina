commit: "fd91a4c5c82a2fdafb9ad4a6d5fdba4f73ba8b84"
decisions:
  - number: 1
    title: Dispatch replaced by registry lookup with per-scope matching semantics
    rationale: >
      Implements the 004 design: static BINDINGS table, scope_of → lookup →
      clone, coded fallbacks for leader unknown-key and text input. The Phase
      0 characterization suite (15 tests) passed unchanged on first run after
      the swap, which is the entire safety argument for deleting 250 lines of
      match arms.
    code_impacts:
      - reasoning: "[Behavioral - Control flow at boundaries] All key dispatch now flows through lookup() + two fallbacks; the fallback ordering (table row wins over char catch-all) is what keeps Ctrl-c = CancelInput instead of text — verify the fallback block, it is the only hand-written dispatch left"
        file: diffviz-review-tui/src/events/input.rs
        line_ranges:
          - start: 70
            end: 103
      - reasoning: "[Structural - Core entity shape] The registry is now the single source of truth for bindings; future binding changes MUST edit this table, never the consumers — reviewers should reject any PR re-adding key matching outside it"
        file: diffviz-review-tui/src/events/bindings.rs
        line_ranges:
          - start: 118
            end: 380
  - number: 2
    title: Overlays render grouped registry rows, accepting minor wording changes
    rationale: >
      which_key previously showed context-sensitive text ("Approve decision"
      vs "Approve chunk" depending on browse cursor); the registry row
      carries one static description ("Toggle approve (decision or chunk)").
      Preserving per-state wording would need presentation logic beyond the
      registry — exactly the coupling being removed. Existing visual tests
      are intentionally loose (contains "Approv") and pass; the trade was
      wording fidelity for structural impossibility of drift.
    code_impacts:
      - reasoning: "[Behavioral - Invariant mutation] Which-key content is no longer context-sensitive to the browse cursor; if a user reports the overlay wording regression, the fix belongs in row descriptions, not by re-hardcoding overlay text"
        file: diffviz-review-tui/src/ui/components/which_key.rs
        line_ranges:
          - start: 64
            end: 92
  - number: 3
    title: CombinedTestResult carries affordances; --test-full output extended
    rationale: >
      The closed loop (act → observe state + legal moves) needs affordances
      captured at each step, so the generic harness collects app.affordances()
      alongside state and visual, and full_test_output prints an Affordances
      section per step. This extends the --test-full format beyond the Phase 2
      byte-golden — a deliberate, additive format change scoped to this phase
      (the Phase 2 golden contract covered the migration, not eternity).
    code_impacts:
      - reasoning: "[Structural - Public API] CombinedTestResult gained a public affordances field — external struct-literal constructors (none in workspace outside the harness) would break; --test-full consumers parsing by section must tolerate the new Affordances section"
        file: tui-harness/src/combined.rs
        line_ranges:
          - start: 10
            end: 20
