  - number: 3
    title: Replace unsafe ManuallyDrop + ptr::read with safe Option<ReviewEngine> + take()
    rationale: into_review_engine() used unsafe ManuallyDrop + ptr::read to extract ownership while preventing Drop. Option<ReviewEngine> with take() achieves identical semantics safely. When into_review_engine() consumes self, Drop impl runs naturally after manual terminal cleanup.
    code_impacts:
      - reasoning: Changed field type to Option to enable safe take() pattern
        file: diffviz-review-tui/src/app.rs
        line_ranges:
          - start: 28
            end: 28
      - reasoning: Wrap review_engine in Some() during construction
        file: diffviz-review-tui/src/app.rs
        line_ranges:
