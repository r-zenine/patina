  - number: 2
    title: Extract 3 magic numbers as named constants
    rationale: Replace hardcoded numeric literals with named constants for clarity and maintainability. LEADER_TIMEOUT (2s timeout for leader key), PAGE_SCROLL_STEP (10 lines per page), CURSOR_VIEW_HEIGHT_FALLBACK (20 lines for viewport fallback height).
    code_impacts:
