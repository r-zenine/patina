    title: Remove misleading TODO comment from diff_formatter.rs
    rationale: Comment claimed lifetime issues needed fixing, but the owned-string approach (format! into Line<'static>) is correct and solves the lifetime issue by moving data into owned String. No work needed — comment was stale documentation.
