commit: 3cc8f14c5b6cd76cfeca1c00e2ed0faaffc4e51f

decisions:
  - number: 1
    title: Remove EditContent feature entirely (feature branch, not implemented)
    rationale: |
      BusinessEvent::EditContent has a no-op handler (Ok(Command::None)) with zero implementation. The feature exists as dead code branches:
      - InputMode::Edit enum variant with no active code paths
      - UiEvent::EnterEditMode keybinding (Space→i→e) that only emits unhandled events
      - Handler blocks in app.rs that set mode but achieve nothing

      YAGNI principle: If content editing is needed in the future, it can be implemented then with full context and requirements.
      Removing now unblocks Phase 4 and simplifies the codebase.
    code_impacts:
