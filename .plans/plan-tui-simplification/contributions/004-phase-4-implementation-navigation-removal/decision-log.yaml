  - number: 2
    title: Remove orphaned state fields file_list_selection and expanded_files
    rationale: |
      These two fields in UiState exist only to support the dead file_list navigation component.
      They are not referenced by any active code paths:
      - toggle_file_expansion() method has zero callers (was only used by deleted file_list.rs)
      - is_file_expanded() method has zero callers (was only used by deleted file_list.rs)
      - file_list_selection has no references in active navigation logic (decision_tree is the active system)
      - expanded_files HashSet is initialized but never used

      Removing them from UiState and StateSnapshot makes the state model cleaner and removes confusion
      about which navigation system is canonical.
