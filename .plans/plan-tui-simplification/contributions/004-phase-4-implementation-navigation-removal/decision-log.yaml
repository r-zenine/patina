decisions:
  - number: 1
    title: Remove all three legacy navigation files entirely
    rationale: |
      The files navigation.rs, decision_list.rs, and file_list.rs are completely dead code with zero live callers.
      The decision_tree system (in decision_navigation.rs) is the active, working navigation pattern.
      These three modules were partial infrastructure left from an earlier navigation approach and should be fully removed.
      Keeping them increases codebase size and creates confusion about which navigation system is active.
    code_impacts:
      - reasoning: Deleted navigation.rs file (dead module with no callers)
        file: diffviz-review-tui/src/navigation.rs
        line_ranges: []
      - reasoning: Removed pub mod navigation from lib.rs (module declaration cleanup)
