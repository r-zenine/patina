  - number: 3
    title: Test harness module unchanged (intentional infrastructure)
    rationale: |
      The test_harness feature-gated module is excluded from simplification because it is intentional,
      necessary agentic infrastructure. Agents cannot launch a TTY to drive the TUI interactively,
      so the harness is the only way to exercise TUI behavior in CI or automated test contexts.
      This is not speculative code — it is load-bearing infrastructure for the project.

      Only fields from StateSnapshot that became structurally dead (expanded_files, file_list_selection)
      were removed as a necessary side-effect of state.rs cleanup.
    code_impacts: []
