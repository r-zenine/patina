commit: "660dec3"
decisions:
  - number: 1
    title: Test the toggle state via StateSnapshot field access (compile-time contract)
    rationale: Group 1 tests access snapshot.show_reasoning directly rather than via JSON deserialization. This makes the compiler enforce the interface — if Phase 1 does not add show_reasoning to UiState and StateSnapshot, the test binary fails to compile. Compile failure is the intended "red" state for TDD.
    code_impacts:
      - reasoning: New test file defining the full feature contract across all three phases
        file: diffviz-review-tui/tests/reasoning_annotation_tests.rs
        line_ranges:
          - start: 1
            end: 200

  - number: 2
    title: Use DECISION_REASONING const for reliable visual assertion matching
    rationale: The annotation injection tests (Group 3) check that reasoning text appears in the rendered diff output. Using a string constant that cannot occur in fixture source code ensures the assertion cannot be accidentally satisfied by existing diff content.
    code_impacts:
      - reasoning: DECISION_REASONING constant defined and used in Group 3 assertions
        file: diffviz-review-tui/tests/reasoning_annotation_tests.rs
        line_ranges:
          - start: 28
            end: 30
