commit: 2b64365
decisions:
  - number: 1
    title: Drop Crossterm variant — crossterm 0.28 uses std::io::Error directly
    rationale: The plan specified `Crossterm(#[from] crossterm::ErrorKind)` but `crossterm::ErrorKind` does not exist in crossterm 0.28. Crossterm operations return `std::io::Error`, which `Terminal(#[from] std::io::Error)` already covers.
    code_impacts:
      - reasoning: TuiError has two variants instead of three; Terminal covers both terminal and crossterm I/O errors
        file: tui-harness/src/error.rs
        line_ranges:
          - start: 1
            end: 14

  - number: 2
    title: run_sequence includes initial snapshot (N events → N+1 snapshots)
    rationale: Matches diffviz's existing InputTestHarness convention. Testing criteria expects 6 outputs for "jjjkr" (initial + 5 events). Makes assertions on starting state possible without a separate snapshot() call.
    code_impacts:
      - reasoning: run_sequence captures initial snapshot before iterating events
        file: tui-harness/src/input_test.rs
        line_ranges:
          - start: 20
            end: 36

  - number: 3
    title: input_parser uses TuiError::App with string errors instead of anyhow
    rationale: The original diffviz source uses `anyhow::anyhow!()` but tui-harness must not depend on anyhow. Replaced with `TuiError::App("message".into())` — `Box<dyn Error + Send + Sync>` accepts `&'static str` via the blanket impl on str.
    code_impacts:
      - reasoning: All anyhow error construction replaced with TuiError::App(.into())
        file: tui-harness/src/input_parser.rs
        line_ranges:
          - start: 44
            end: 105
