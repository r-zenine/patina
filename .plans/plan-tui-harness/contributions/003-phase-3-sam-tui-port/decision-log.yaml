commit: 748ccd9
decisions:
  - number: 1
    title: Replace tui 0.19 + termion with ratatui 0.28 + crossterm
    rationale: |
      ratatui is a maintained fork of tui 0.19 with a stable API. The migration was low-risk
      because Widget, Layout, Style, Block, List APIs are largely compatible with minor namespace
      changes. crossterm replaces termion for cross-platform support.
      Key breaking changes handled: Frame generic removed (now just Frame), f.size() replaced
      by f.area(), Layout constraints no longer need .as_ref() (accept arrays directly).
    code_impacts:
      - file: sam-tui/Cargo.toml
        line_ranges:
          - start: 1
            end: 17
        reasoning: Remove tui + termion; add ratatui 0.28, crossterm 0.28, tui-harness, serde

      - file: sam-tui/src/modal_view/theme.rs
        line_ranges:
          - start: 1
            end: 1
        reasoning: Import path changed from tui::style to ratatui::style

      - file: sam-tui/src/modal_view/ui_insert_mode.rs
        line_ranges:
          - start: 1
            end: 10
        reasoning: All tui imports replaced with ratatui; Frame generic and Backend bound removed; f.area() used

      - file: sam-tui/src/modal_view/ui_options_mode.rs
        line_ranges:
          - start: 1
            end: 7
        reasoning: All tui imports replaced with ratatui; Frame generic and Backend bound removed; f.area() used

  - number: 2
    title: UIModal becomes a pure drawing helper (no terminal ownership)
    rationale: |
      In the original design, UIModal<V> owned the Terminal and managed raw mode setup,
      the rate-limiting refresh timer (75ms), and the Drop cleanup. With tui-harness, the
      terminal lifecycle is owned by run_app(). UIModal now only holds a UITheme and delegates
      draw calls to UIInsertMode and UIOptionsMode. The 75ms rate-limiting is replaced by the
      60fps cap in run_app via the frame_duration poll.
    code_impacts:
      - file: sam-tui/src/modal_view/ui.rs
        line_ranges:
          - start: 1
            end: 45
        reasoning: New implementation — terminal and timing fields removed; draw() takes mutable Frame

  - number: 3
    title: ModalView implements ELMApp; run() delegates to tui_harness::run_app
    rationale: |
      The recursive run() loop is replaced with a single call to tui_harness::run_app(&mut self).
      ELMApp::dispatch_key maps crossterm KeyEvent to AppEvent to state.update(), tracking
      ExecutionState in two bool fields (should_quit, cancelled). After run_app returns, run()
      checks cancelled to decide whether to return Some(response) or None. No Drop impl needed.
      Public API of ModalView::new() + run() is preserved unchanged.
    code_impacts:
      - file: sam-tui/src/modal_view/view.rs
        line_ranges:
          - start: 1
            end: 105
        reasoning: Full rewrite — crossterm key_transformer, ModalView struct, ELMApp impl

  - number: 4
    title: j/k added as vim-style navigation bindings (Down/Up) in InsertMode
    rationale: |
      The roadmap testing criteria specified "Navigation test: run_sequence('jj') -> cursor: 2".
      To satisfy this, j and k are mapped to Down/Up when no modifiers are present. This is a
      deliberate enhancement over the original termion version which only had arrow keys and
      Ctrl-n/Ctrl-p. Trade-off: j and k can no longer be typed as filter characters. In OptionsMode,
      j/k navigation events are ignored by state.update() so option keys 'j'/'k' would not toggle.
    code_impacts:
      - file: sam-tui/src/modal_view/view.rs
        line_ranges:
          - start: 34
            end: 36
        reasoning: j mapped to AppEvent::Down; k mapped to AppEvent::Up (no modifiers only)

  - number: 5
    title: HeadlessModalView<V> + SamSnapshot for harness-based testing
    rationale: |
      SamSnapshot is a concrete struct (not generic over V) capturing only primitives:
      current_mode, cursor, filter_query, item_count, marked_count. This avoids requiring V to
      implement Serialize and keeps snapshots assertion-friendly. marked_count calls
      state.list.marked_values().len() which clones the HashSet — acceptable cost in test contexts.
      HeadlessModalView shares the key_transformer function from view.rs to avoid duplicate key mapping.
    code_impacts:
      - file: sam-tui/src/modal_view/headless.rs
        line_ranges:
          - start: 1
            end: 105
        reasoning: New file — HeadlessModalView<V>, SamSnapshot struct, ELMApp impl

  - number: 6
    title: SamTuiError uses thiserror with a single Terminal variant from std::io::Error
    rationale: |
      crossterm 0.28 surfaces all errors as std::io::Error (no separate ErrorKind type).
      A single Terminal variant with from std::io::Error covers all I/O failures from both
      terminal setup and crossterm event reads. No anyhow needed in sam-tui.
      ELMApp type Error = SamTuiError on both ModalView and HeadlessModalView.
    code_impacts:
      - file: sam-tui/src/error.rs
        line_ranges:
          - start: 1
            end: 7
        reasoning: New file — SamTuiError enum with Terminal(#[from] std::io::Error)

  - number: 7
    title: Integration tests use InputTestHarness and RenderTestHarness via tui-harness
    rationale: |
      11 integration tests in tests/harness_tests.rs cover navigation (j/k/arrows), cursor boundary,
      filter reduction, backspace, mode toggle via Esc, multi-select via Ctrl-s, confirm via Enter,
      render non-empty output, and render contains item text. All tests are headless (TestBackend).
      Tests validate the ELMApp contract without constructing a real terminal.
    code_impacts:
      - file: sam-tui/tests/harness_tests.rs
        line_ranges:
          - start: 1
            end: 110
        reasoning: New file — integration tests using InputTestHarness with HeadlessModalView and MockValue
