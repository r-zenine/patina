decisions:
  - number: 1
    title: Strategy - Core-then-Integrate
    rationale: |
      User explicitly selected Core-then-Integrate. This is correct for this project because:
      (1) the harness is a shared abstraction that must exist before either consumer can be ported,
      (2) the ELMApp trait design must be validated against a real example before diffviz and sam integrate,
      (3) the kitchen-sink example in Phase 1 proves the trait is sufficient before any port work begins.
      Building core first eliminates the risk of designing a trait that doesn't fit both consumers.
    code_impacts: []

  - number: 2
    title: ELMApp is both a development runtime and a testing interface
    rationale: |
      tui-harness serves two roles: (1) a development runtime that eliminates event-loop boilerplate
      for any ELM-style TUI, and (2) a testing framework that enables agentic headless testing.
      Both roles are built on the same ELMApp trait — implementing it once gives you both for free.

      The trait interface:
        type Snapshot: serde::Serialize          — serializable state for test assertions
        type Error: std::error::Error + Send + Sync + 'static  — app-owned error type
        fn dispatch_key(&mut self, key: KeyEvent) -> Result<(), Self::Error>
        fn draw(&self, frame: &mut ratatui::Frame)
        fn should_quit(&self) -> bool            — drives the run_app() loop
        fn snapshot(&self) -> Self::Snapshot     — used by testing harnesses + debug modes

      dispatch_key takes crossterm::event::KeyEvent (not each app's domain event type) because:
      (1) the framework delivers raw input; the app owns its key→domain-event mapping — this is
      the direct equivalent of how Elm's runtime delivers Msg values to the app's update function,
      (2) domain events are app-specific; exposing them as an associated type would couple the
      framework to unrelated event models (diffviz has a two-level UiEvent+BusinessEvent system;
      sam has a flat 8-variant Event — no common abstraction exists),
      (3) KeyEvent feeds directly from input_parser into dispatch_key with no app-specific plumbing.

      Rejected: `type DomainEvent` associated type with separate `map_key + update` split — adds
      complexity without benefit since each app already implements this split internally.

      The framework provides run_app<M: ELMApp>(app: &mut M) -> Result<()> which handles terminal
      setup, the 60fps frame loop, crossterm event polling, and teardown. diffviz's ReviewTuiApp::run()
      and sam's ModalView::run() are both replaced by a single call to run_app().
    code_impacts:
      - file: tui-harness/src/traits.rs
        line_ranges:
          - start: 1
            end: 30
        reasoning: ELMApp trait with associated Error type, dispatch_key, draw, should_quit, snapshot
      - file: tui-harness/src/runtime.rs
        line_ranges:
          - start: 1
            end: 1
        reasoning: New file — run_app<M: ELMApp>() implementing the production event loop

  - number: 2b
    title: No anyhow in tui-harness — thiserror + associated Error type
    rationale: |
      anyhow is appropriate for application binaries (rich error context, easy propagation).
      tui-harness is a library crate used by other crates; libraries must not impose anyhow on
      their consumers (anyhow::Error is opaque and hard to match on downstream).

      Decision: use thiserror for the crate's own error type, and an associated type on ELMApp
      so each app owns its error model without the framework imposing a type.

      tui-harness defines:
        #[derive(Debug, thiserror::Error)]
        pub enum TuiError {
            #[error("terminal I/O error")] Terminal(#[from] std::io::Error),
            #[error("crossterm error")]    Crossterm(#[from] crossterm::ErrorKind),
            #[error("application error: {0}")] App(Box<dyn std::error::Error + Send + Sync + 'static>),
        }
        pub type Result<T> = std::result::Result<T, TuiError>;

      run_app() returns Result<()> (TuiError). App errors from dispatch_key are wrapped via
      TuiError::App(Box::new(e)) — the framework propagates them without needing to know their type.

      Each app provides its own Error type:
        diffviz: type Error = anyhow::Error  (anyhow::Error: std::error::Error, so this compiles)
        sam:     type Error = SamTuiError    (new thiserror-based type in Phase 3)

      The harness test infrastructure (InputTestHarness etc.) returns Result<_, TuiError>.
      App errors surface via TuiError::App without unwrapping.
    code_impacts:
      - file: tui-harness/src/error.rs
        line_ranges:
          - start: 1
            end: 1
        reasoning: New file — TuiError enum + Result<T> type alias
      - file: tui-harness/Cargo.toml
        line_ranges:
          - start: 1
            end: 20
        reasoning: thiserror in [dependencies]; no anyhow

  - number: 3
    title: sam crates merged into patina monorepo; tui-harness is a sibling workspace dep
    rationale: |
      All sam crates have been moved into the patina workspace as a monorepo for personal productivity
      (unified dependency management, consistent patterns, single cargo workspace).
      tui-harness and sam-tui are now siblings under the same workspace root.
      Decision: simple sibling path dep (`path = "../tui-harness"` in sam-tui/Cargo.toml).
      No cross-workspace path dep, no publish overhead, no git dep needed.
    code_impacts:
      - file: sam-tui/Cargo.toml
        line_ranges:
          - start: 1
            end: 20
        reasoning: tui-harness = { path = "../tui-harness" } under [dev-dependencies]

  - number: 4
    title: Kitchen-sink example is a self-contained counter ELM app in tui-harness/examples/
    rationale: |
      The kitchen-sink example must: (1) implement ELMApp with a non-trivial Snapshot,
      (2) exercise all three harness types (InputTestHarness, RenderTestHarness, CombinedTestHarness),
      (3) be runnable as a standalone binary, (4) serve as documentation-by-example for integrators.
      Decision: a toy counter app (increment/decrement/reset) with a visible TUI panel.
      Counter is complex enough to show multi-step state transitions but simple enough to follow quickly.
      The example binary both runs the TUI interactively AND, when passed --test-mode, runs the harness
      and prints results — single binary, two modes, zero extra setup.
    code_impacts:
      - file: tui-harness/examples/kitchen_sink.rs
        line_ranges:
          - start: 1
            end: 1
        reasoning: New file — toy counter app implementing ELMApp + harness demo

  - number: 5
    title: sam-tui migrates to ratatui 0.28 + crossterm as part of Phase 3
    rationale: |
      tui 0.19 + termion cannot share TestBackend with ratatui — they are forks with separate types.
      The harness's RenderTestHarness uses ratatui::backend::TestBackend.
      Migration path: tui 0.19 → ratatui 0.28 is low-risk because ratatui is a maintained fork;
      Widget, Layout, Style, Block, List APIs are API-compatible with minor namespace changes.
      termion → crossterm: crossterm is cross-platform (Windows/Unix) vs termion (Unix only).
      sam's key_transformer() replaces termion::event::Key matching with crossterm::event::KeyCode/KeyModifiers.
      Recursive ModalView.run() is replaced with an iterative loop (matches diffviz pattern, avoids stack overflow
      on long sessions).
    code_impacts:
      - file: sam-tui/Cargo.toml
        line_ranges:
          - start: 1
            end: 20
        reasoning: Replace tui + termion with ratatui + crossterm
      - file: sam-tui/src/modal_view/view.rs
        line_ranges:
          - start: 1
            end: 121
        reasoning: Full rewrite of event loop and key mapping
      - file: sam-tui/src/modal_view/ui.rs
        line_ranges:
          - start: 1
            end: 1
        reasoning: Update imports and backend type

  - number: 6
    title: sam-tui Snapshot is a concrete struct, not generic over V
    rationale: |
      ViewState<V: Value> is generic; V may not implement Serialize.
      The ELMApp::Snapshot for sam's headless variant must be Serialize.
      Decision: create a concrete SamSnapshot struct capturing primitives only:
      { current_mode: String, cursor: usize, filter_query: String, item_count: usize, marked_count: usize }
      This avoids requiring V: Serialize and keeps the snapshot lightweight and assertion-friendly.
      Items themselves are not snapshotted (not needed for testing navigation logic).
    code_impacts:
      - file: sam-tui/src/modal_view/headless.rs
        line_ranges:
          - start: 1
            end: 1
        reasoning: New file — HeadlessModalView<V> + SamSnapshot struct
