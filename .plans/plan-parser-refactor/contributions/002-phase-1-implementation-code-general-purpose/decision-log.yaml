commit: 13322de
decisions:
  - number: 1
    title: impl_item represented as Module(Namespace) so ranges resolve to methods, not the file
    rationale: create_reviewable_diff_from_range takes the decompose path only for Module variants. DataStructure takes the expand path — impl block is ~240 bytes, total_bytes/2 is ~199, so the test assertion boundary_lines < total_bytes/2 would fail. Module(Namespace) causes decompose, which finds the enclosed function_item and returns it as the boundary.
    code_impacts:
      - reasoning: build_impl_container creates Module{Namespace} when SemanticNodeKind::ImplBlock is encountered
        file: diffviz-core/src/parsers/generic_builder.rs
        line_ranges:
          - start: 277
            end: 300
      - reasoning: impl_item maps to ImplBlock in the kind map, which generic_builder converts to Module{Namespace}
        file: diffviz-core/src/parsers/rust.rs
        line_ranges:
          - start: 38
            end: 38

  - number: 2
    title: attribute_item nodes become Unknown children (not metadata_nodes) to give their bytes a SemanticNode owner
    rationale: find_unit_recursive checks only tree_sitter_node.byte_range() of SemanticNode children. Bytes belonging to no SemanticNode are unowned — a range covering only #[derive] + struct keyword finds nothing and returns empty. Making attribute_item an Unknown child transfers byte ownership, so find_contained_units_recursive finds it and the struct-range tests pass.
    code_impacts:
      - reasoning: build_container_children pushes an Unknown node for any child matching metadata_kind()
        file: diffviz-core/src/parsers/generic_builder.rs
        line_ranges:
          - start: 96
            end: 103
      - reasoning: metadata_kind() returns Some("attribute_item") so attribute nodes become Unknown children
        file: diffviz-core/src/parsers/rust.rs
        line_ranges:
          - start: 209
            end: 211

  - number: 3
    title: doc_comment in trivial_kinds so range queries return the enclosing function, not the comment
    rationale: If doc_comment becomes an Unknown child, find_units_touching_range_recursive returns the doc comment as the first result for a range starting at the comment lines. diffs.remove(0) is then Unknown instead of Callable, and the test assertion node_type.contains("Callable") fails. Keeping doc_comment trivial skips it entirely.
    code_impacts:
      - reasoning: doc_comment added to RUST_TRIVIAL_KINDS
        file: diffviz-core/src/parsers/rust.rs
        line_ranges:
          - start: 179
            end: 179

  - number: 4
    title: get_unit_type_name(Callable) returns "Callable" instead of "Function"
    rationale: The bug test asserts node_type.contains("Callable"). The SemanticUnitType variant is Callable, so the display name should match. "Function" was a legacy name from the old bespoke RustParser.
    code_impacts:
      - reasoning: Callable arm of get_unit_type_name changed to "Callable"
        file: diffviz-core/src/decision_based_diff.rs
        line_ranges:
          - start: 445
            end: 445

  - number: 5
    title: visibility_modifier appears in both semantic_kind_map and trivial_kinds — the two lists serve orthogonal purposes
    rationale: The regression test asserts classify_node_kind("visibility_modifier") == SignatureComponent, so it must be in semantic_kind_map. It must also be in trivial_kinds to be skipped during tree construction. trivial_kinds governs tree building; semantic_kind_map governs classify_node_kind. Overlap is intentional.
    code_impacts:
      - reasoning: visibility_modifier entry in RUST_SEMANTIC_KIND_MAP
        file: diffviz-core/src/parsers/rust.rs
        line_ranges:
          - start: 55
            end: 55
      - reasoning: visibility_modifier entry in RUST_TRIVIAL_KINDS
        file: diffviz-core/src/parsers/rust.rs
        line_ranges:
          - start: 150
            end: 151

  - number: 6
    title: RustParser is a newtype over GenericSemanticTreeBuilder<RustDescriptor>, delegating all methods except get_context_boundaries
    rationale: Zero caller changes — all callsites hold &dyn LanguageParser. get_context_boundaries carries Rust-specific boundary semantics (ImplBlock context for functions, etc.) that cannot be expressed in the generic builder, so only that method is overridden.
    code_impacts:
      - reasoning: RustParser newtype struct and LanguageParser impl
        file: diffviz-core/src/parsers/rust.rs
        line_ranges:
          - start: 222
            end: 295
