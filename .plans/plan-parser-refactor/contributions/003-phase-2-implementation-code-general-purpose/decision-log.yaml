        file: diffviz-core/src/parsers/typescript.rs
        line_ranges:
          - start: 111
            end: 113
      - reasoning: JavaScriptDescriptor.metadata_kind returns Some("decorator")
        file: diffviz-core/src/parsers/javascript.rs
        line_ranges:
