commit: 4905349
decisions:
  - number: 1
    title: All 7 language descriptors follow the same static-table pattern as RustDescriptor
    rationale: Each parser is a thin newtype over GenericSemanticTreeBuilder<LangDescriptor>. Kind maps are lifted directly from the existing classify_node_kind match arms; trivial_kinds are lifted from is_trivial_syntax_token. No bespoke tree-building logic is carried forward — the generic builder handles everything.
