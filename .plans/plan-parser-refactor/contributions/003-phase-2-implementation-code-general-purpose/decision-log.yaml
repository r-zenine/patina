  - number: 2
    title: Python and Go override extract_visibility for naming-convention-based visibility
    rationale: Python has no visibility_modifier keyword; visibility is encoded in the name (_name = private, __name__ = magic, name = public). Go uses the same convention (capitalised = exported/public). Both overrides call child_by_field_name("name") on the item node, which is available for function_definition, async_function_definition, class_definition, function_declaration, and method_declaration.
    code_impacts:
      - reasoning: PythonDescriptor.extract_visibility checks underscore name-prefix convention
        file: diffviz-core/src/parsers/python.rs
        line_ranges:
          - start: 112
            end: 130
      - reasoning: GoDescriptor.extract_visibility checks ASCII-uppercase capitalisation convention
        file: diffviz-core/src/parsers/go.rs
        line_ranges:
          - start: 110
            end: 128

  - number: 3
    title: PythonParser overrides get_context_boundaries; all others use the LanguageParser default
    rationale: The existing PythonParser overrode get_context_boundaries with Python-specific boundaries (Function→Class→Module→SourceFile etc.). All other languages (Go, TypeScript, Java, C, C++, JavaScript) never overrode it in the old code, so the new newtypes simply delegate to GenericSemanticTreeBuilder which falls through to the default LanguageParser implementation.
    code_impacts:
      - reasoning: PythonParser.get_context_boundaries — Python-specific boundary logic preserved
        file: diffviz-core/src/parsers/python.rs
        line_ranges:
          - start: 155
            end: 192

  - number: 4
    title: Python, TypeScript, and JavaScript set metadata_kind to "decorator"; others set None
    rationale: Python, TypeScript, and JavaScript have first-class decorator syntax (@decorator). The generic builder converts decorator nodes to Unknown children so their bytes are owned (the same byte-coverage fix as Rust attribute_item in Phase 1). Go, Java, C, and C++ have no equivalent annotation construct requiring metadata handling.
    code_impacts:
      - reasoning: PythonDescriptor.metadata_kind returns Some("decorator")
        file: diffviz-core/src/parsers/python.rs
        line_ranges:
          - start: 108
            end: 110
