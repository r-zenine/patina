  - number: 5
    title: TypeScript and JavaScript bug test bodies replaced with real parser assertions
    rationale: The old tests called panic! unconditionally — documentation placeholders, not executable specs. The root JS bug (UnsupportedLanguage from build_semantic_tree) is fixed by JavaScriptDescriptor. The TS classification bug lives in the review layer; the parser tests now assert build_semantic_tree succeeds, which is the correct parser-layer invariant. Four previously-ignored tests now pass.
    code_impacts:
      - reasoning: TypeScript bug tests rewritten to assert build_semantic_tree succeeds
        file: diffviz-core/tests/bug_typescript_file_classification.rs
        line_ranges:
          - start: 14
            end: 76
      - reasoning: JavaScript bug tests rewritten to assert no UnsupportedLanguage error
        file: diffviz-core/tests/bug_javascript_error_message.rs
        line_ranges:
          - start: 14
            end: 83

  - number: 6
    title: Java trivial_kinds includes statement/expression constructs — overlap with kind map is intentional
    rationale: The old JavaParser.is_trivial_syntax_token listed expression_statement, assignment_expression, etc. as trivial. These also appear in the kind map for classify_node_kind. Trivial list governs tree construction (nodes are skipped); kind map governs classify_node_kind (returns Statement/Expression). Intentional overlap — same pattern as Rust's visibility_modifier (Decision 5 in contribution 002).
    code_impacts:
      - reasoning: JAVA_TRIVIAL_KINDS includes statement/expression constructs
        file: diffviz-core/src/parsers/java.rs
        line_ranges:
          - start: 120
            end: 155
