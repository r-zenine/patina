decisions:
  - number: 1
    title: "Core-then-Integrate strategy for parser refactor"
    context: |
      Three strategies considered for refactoring 7 copy-paste parsers (~5,000 lines)
      into a data-driven architecture. Requirements: complete byte coverage guarantee,
      fix 4 open bugs, promote JavaScript, no backward compat needed.
    decision: |
      Use Core-then-Integrate: build the generic builder + LanguageDescriptor trait first
      (domain core), then implement language descriptors (adapters), then port callers
      and remove old parsers (integration).
    rationale: |
      - Complex domain logic (semantic tree building) benefits from isolated development
      - Existing test suite provides correctness oracle for validation
      - Clean architecture goals align with Core-then-Integrate's layered approach
      - One-shot migration constraint means we need a solid core before touching callers
    consequences: |
      - Phase 1 can be developed and tested in isolation against fixtures
      - Phase 2 (language descriptors) is embarrassingly parallel per language
      - Phase 3 (porting callers) is mechanical once core is stable
    alternatives_considered:
      - TDD: Would work but doesn't address the architectural decomposition needed
      - Steel Thread: Unnecessary — requirements are clear, no early feedback needed

  - number: 2
    title: "LanguageDescriptor trait instead of config structs"
    context: |
      Two approaches for the data-driven design: (a) a trait with methods that return
      dispatch tables and override hooks, or (b) static config structs (HashMap of node
      kind → SemanticUnitType mappings). Need to support both common patterns and
      genuinely unique logic like Rust impl blocks.
    decision: |
      Use a LanguageDescriptor trait with default methods for common patterns and
      override points for language-specific logic. The trait provides node-kind-to-semantic-type
      mapping, trivial token sets, metadata node kinds, and visibility extraction. A generic
      GenericSemanticTreeBuilder consumes any LanguageDescriptor to produce SemanticTree.
    rationale: |
      - Traits with default methods give zero-cost abstraction in Rust
      - Override points handle genuine divergence (impl blocks, preprocessor) without config bloat
      - Easier to test: each descriptor is a unit, the builder is a unit
      - More idiomatic Rust than HashMap-based config
    consequences: |
      - Each language becomes a small struct implementing LanguageDescriptor (~50-100 lines)
      - GenericSemanticTreeBuilder owns all shared logic (~300-400 lines, written once)
      - Language-specific overrides are explicit and auditable
    alternatives_considered:
      - Static config structs: Less flexible for overrides, requires escape hatches that become messy
      - Macro-generated parsers: Too opaque, hard to debug and test

  - number: 3
    title: "Complete byte coverage as a structural invariant"
    context: |
      Two of the four open bugs (impl block expansion, struct range expansion) stem from
      gaps in the SemanticTree where byte ranges don't map to any node, causing
      find_semantic_unit_at_range() to escalate to the file-level Module node.
    decision: |
      The GenericSemanticTreeBuilder will enforce complete byte coverage: every byte in
      the source must belong to exactly one SemanticNode. Unrecognized regions between
      known nodes are wrapped in SemanticUnitType::Unknown nodes. This is a structural
      invariant, not a best-effort behavior.
    rationale: |
      - Eliminates the entire class of range-escalation bugs
      - Makes find_semantic_unit_at_range() always return a meaningful result
      - Unknown nodes are honest about what the parser doesn't understand
      - Invariant can be asserted in tests: sum of child byte ranges == parent byte range
    consequences: |
      - impl block bug resolves: impl_item becomes a DataStructure node with methods as children
      - struct range bug resolves: any byte range within a struct resolves to the struct node
      - May slightly increase SemanticTree node count (more Unknown wrappers), negligible cost
    alternatives_considered:
      - Gap-filling as post-processing: fragile, doesn't prevent new gaps in new languages
      - Allowing gaps with fallback logic: exactly what caused the bugs in the first place

  - number: 4
    title: "Evolve LanguageParser trait, don't replace it"
    context: |
      The existing LanguageParser trait is used as &dyn LanguageParser in ~15 call sites
      across decision_based_diff.rs, reviewable_diff.rs, and review_engine_builder.rs.
      Could either replace it entirely or evolve it to wrap the new system.
    decision: |
      Keep LanguageParser as the public-facing trait but simplify its implementation:
      provide a blanket impl or generic struct that wraps LanguageDescriptor +
      GenericSemanticTreeBuilder. Callers continue using &dyn LanguageParser unchanged.
    rationale: |
      - Minimizes blast radius on callers (same trait, same methods)
      - LanguageParser's API (try_parse, build_semantic_tree, classify_node_kind) is good
      - Only internal implementation changes, not the contract
      - review_engine_builder.rs factory barely changes (new types, same pattern)
    consequences: |
      - Callers in diffviz-core and diffviz-review need minimal updates
      - Each language parser struct becomes a thin wrapper delegating to GenericSemanticTreeBuilder
      - Tests using &dyn LanguageParser or Box<dyn LanguageParser> keep working
    alternatives_considered:
      - New trait replacing LanguageParser: unnecessary churn for 15+ call sites with no benefit
      - Direct GenericSemanticTreeBuilder usage everywhere: loses the nice trait abstraction
