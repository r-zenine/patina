[workspace]
resolver = "2"
members = [
    "diffviz-cli",
    "diffviz-review",
    "diffviz-git",
    "diffviz-core",
    "diffviz-review-tui",
    "diffviz-schema-macro",
    "tui-harness",
    # sam
    "sam-cli",
    "sam-config",
    "sam-core",
    "sam-mcp",
    "sam-persistence",
    "sam-readers",
    "sam-terminals",
    "sam-tui",
    "sam-utils",
]

[workspace.dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
chrono = { version = "0.4", features = ["serde"] }
dirs = "5.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
sha2 = { version = "0.10.9" }
log = "0.4.27"
tempfile = "3.8"

[profile.bench]
debug = true
opt-level = 3
